<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🎙️ Live Interpreter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#0f1117; --panel:#1a1d2e; --panel2:#141624; --border:#2a2d45;
      --accent:#4dabf7; --green:#40c057; --red:#fa5252;
      --yellow:#ffd43b; --purple:#cc5de8; --muted:#7a7a9a; --text:#e0e0e0;
    }
    html,body { height:100%; overflow:hidden; background:var(--bg); }
    body { font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
           color:var(--text); display:flex; flex-direction:column; }

    header { background:var(--panel); border-bottom:1px solid var(--border);
             padding:9px 13px; display:flex; align-items:center;
             justify-content:space-between; flex-shrink:0; gap:8px; }
    header h1 { font-size:15px; color:var(--accent); white-space:nowrap; }
    #setup-toggle { font-size:11px; color:var(--muted); background:#2a2d45;
                    border:1px solid var(--border); border-radius:12px;
                    padding:4px 10px; cursor:pointer; flex-shrink:0; }

    #setup-panel { background:var(--panel2); border-bottom:2px solid var(--accent);
                   padding:11px 13px; flex-shrink:0; }
    .setup-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:7px; }
    .setup-row:last-of-type { margin-bottom:0; }
    .setup-label { font-size:11px; color:var(--muted); padding-top:7px;
                   width:78px; flex-shrink:0; white-space:nowrap; }
    .setup-input { flex:1; background:var(--panel); border:1px solid var(--border);
                   color:var(--text); padding:6px 9px; border-radius:6px;
                   font-size:13px; font-family:monospace; min-width:0; }
    .setup-input:focus { outline:none; border-color:var(--accent); }
    textarea.setup-input { font-family:inherit; resize:none; font-size:12px; height:46px; }
    .info-note { margin-top:8px; padding:6px 10px; background:#1a2a1a;
                 border-radius:6px; font-size:11px; color:#69db7c; line-height:1.55;
                 border-left:3px solid #40c057; }

    #statusbar { background:var(--panel2); border-bottom:1px solid var(--border);
                 padding:4px 13px; display:flex; gap:7px; align-items:center;
                 flex-shrink:0; flex-wrap:wrap; }
    .badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; border:1px solid; }
    .boff  { background:#2a1a1a; color:#ff6b6b; border-color:#ff6b6b; }
    .bon   { background:#1a3a1a; color:#69db7c; border-color:#69db7c; }
    .bwait { background:#2a2a1a; color:#ffd43b; border-color:#ffd43b; }
    .stat  { font-size:11px; color:var(--muted); }
    .stat b { color:var(--accent); }

    #err { display:none; background:#3a1a1a; color:var(--red);
           padding:5px 13px; font-size:12px; flex-shrink:0; }
    #err.show { display:block; }

    #tabs { background:var(--panel); border-bottom:1px solid var(--border);
            display:flex; flex-shrink:0; }
    .tab-btn { flex:1; padding:9px 4px; border:none; background:none;
               color:var(--muted); font-size:13px; font-weight:bold; cursor:pointer;
               border-bottom:2px solid transparent; transition:all .15s;
               -webkit-touch-callout:none; -webkit-user-select:none; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    #main { flex:1; min-height:0; overflow:hidden; position:relative; }
    .tab-pane { position:absolute; inset:0; display:none; flex-direction:column; }
    .tab-pane.active { display:flex; }

    #split-top { flex:0 0 34%; min-height:0; overflow-y:scroll; padding:8px 12px 6px;
                 -webkit-overflow-scrolling:touch; background:var(--bg); }
    #split-divider { flex-shrink:0; height:28px; background:var(--panel2);
                     border-top:1px solid var(--border); border-bottom:1px solid var(--border);
                     display:flex; align-items:center; justify-content:space-between;
                     padding:0 12px; }
    #split-divider-label { font-size:10px; color:var(--muted);
                           text-transform:uppercase; letter-spacing:.8px; }
    #rec-inline { font-size:11px; color:var(--yellow); }
    #split-bottom { flex:1; min-height:0; overflow-y:scroll; padding:8px 12px 12px;
                    -webkit-overflow-scrolling:touch; }

    #tab-summary { overflow-y:scroll; -webkit-overflow-scrolling:touch;
                   padding:10px 12px 14px; }

    /* 英語原文 */
    #transcript-committed { font-size:13px; line-height:1.9; color:#bbb;
                             word-break:break-word; }
    #transcript-interim   { font-size:13px; line-height:1.9; color:var(--yellow);
                             word-break:break-word; opacity:.8; }
    /* ハイライトスタイル */
    .hl-latest { background:rgba(204,93,232,0.40); border-bottom:2px solid #cc5de8;
                 border-radius:3px; padding:1px 2px; }
    .hl-prev   { background:rgba(77,171,247,0.15); border-bottom:1px solid #4dabf755;
                 border-radius:3px; padding:1px 2px; }

    /* 翻訳カード */
    .jp-card { background:var(--panel2); border:1px solid #4dabf722;
               border-radius:10px; padding:11px 13px; margin-bottom:9px;
               animation:fi .25s ease; }
    .jp-card.latest { border-color:var(--purple); box-shadow:0 0 10px #cc5de844; }
    @keyframes fi { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
    .jp-meta { font-size:10px; color:var(--muted); margin-bottom:5px;
               display:flex; justify-content:space-between; align-items:center; }
    .jp-lag  { background:#1a1a2e; border:1px solid var(--border); border-radius:8px;
               padding:1px 6px; font-size:10px; color:var(--purple); }
    .jp-text { font-size:16px; line-height:1.85; color:#e8f4ff; }
    .jp-src  { margin-top:6px; padding-top:6px; border-top:1px solid var(--border);
               font-size:11px; color:var(--muted); line-height:1.5; }
    #jp-ph   { color:var(--muted); font-size:12px; text-align:center;
               padding:32px 0; line-height:1.8; }

    /* 要約カード */
    .smr-card { background:var(--panel2); border:1px solid #40c05733;
                border-radius:10px; padding:12px 13px; margin-bottom:9px; animation:fi .3s ease; }
    .smr-card.loading { opacity:.65; }
    .smr-card.error   { border-color:#fa525244; }
    .smr-meta { font-size:10px; color:var(--muted); margin-bottom:7px;
                display:flex; justify-content:space-between; align-items:center; }
    .smr-meta-label { background:#40c05722; color:#40c057; border:1px solid #40c05744;
                      border-radius:10px; padding:1px 8px; font-size:10px; }
    .smr-overview  { font-size:13px; line-height:1.75; color:#d4f5e0; background:#1a2e1a;
                     border-left:3px solid #40c057; padding:8px 10px; border-radius:4px; margin-bottom:9px; }
    .smr-section-title { font-size:10px; font-weight:bold; color:#40c057; letter-spacing:.8px;
                         text-transform:uppercase; margin:9px 0 4px; padding-bottom:3px;
                         border-bottom:1px solid #40c05733; }
    .smr-points { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px; }
    .smr-point  { font-size:13px; line-height:1.75; color:#d4f5e0; padding-left:15px; position:relative; }
    .smr-point::before { content:'•'; position:absolute; left:0; color:#40c057; }
    .smr-keywords { font-size:12px; color:var(--muted); line-height:1.6;
                    background:#0f1117; border-radius:4px; padding:5px 8px; margin-top:3px; }
    #sum-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    #sum-cd  { font-size:11px; color:var(--muted); }
    #sum-ph  { color:var(--muted); font-size:12px; text-align:center; padding:40px 0; line-height:1.8; }

    #save-modal { display:none; position:fixed; inset:0; background:#000a; z-index:100;
                  align-items:flex-end; }
    #save-modal.open { display:flex; }
    #save-modal-inner { background:var(--panel); border-radius:16px 16px 0 0; padding:16px;
                        width:100%; max-height:75vh; display:flex; flex-direction:column; gap:10px; }
    #save-modal-title { font-size:14px; font-weight:bold; color:var(--accent); }
    #save-modal-text  { flex:1; min-height:0; background:var(--bg); border:1px solid var(--border);
                        border-radius:8px; padding:10px; color:#ccc; font-size:12px;
                        font-family:monospace; overflow-y:scroll; resize:none;
                        -webkit-overflow-scrolling:touch; white-space:pre-wrap; }
    #save-modal-btns  { display:flex; gap:8px; }

    #save-status { display:none; background:#1a2a3a; color:var(--accent);
                   padding:7px 13px; font-size:12px; text-align:center;
                   flex-shrink:0; border-top:1px solid #4dabf744; }

    #ctrl-bar { background:var(--panel); border-top:1px solid var(--border);
                padding:9px 12px; display:flex; gap:6px; flex-shrink:0;
                justify-content:center; flex-wrap:wrap; }
    .btn { padding:10px 18px; border:none; border-radius:22px; cursor:pointer;
           font-size:13px; font-weight:bold; transition:opacity .15s;
           -webkit-touch-callout:none; -webkit-user-select:none; white-space:nowrap; }
    .btn:active { opacity:.65; }
    .btn:disabled { opacity:.35; pointer-events:none; }
    .g { background:var(--green); color:#fff; }
    .r { background:var(--red); color:#fff; }
    .d { background:#3a3d55; color:#ccc; }
    .p { background:var(--purple); color:#fff; font-size:12px; padding:10px 14px; }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>

<header>
  <h1>🎙️ Live Interpreter
    <span style="font-size:10px;color:var(--muted);font-weight:normal"> Claude</span>
  </h1>
  <button id="setup-toggle" onclick="toggleSetup()">⚙️ 設定</button>
</header>

<div id="setup-panel">
  <div class="setup-row">
    <span class="setup-label">🤖 Claude Key</span>
    <input type="password" id="claude-key" class="setup-input"
           placeholder="sk-ant-api03-..." oninput="saveKeys()">
  </div>
  <div class="setup-row">
    <span class="setup-label">📋 背景情報</span>
    <textarea id="session-context" class="setup-input"
              placeholder="例: AI国際カンファレンス。DeFiの議論。" oninput="saveContext()"></textarea>
  </div>
  <div class="info-note">
    ✅ OpenAI不要 — ブラウザ内蔵STT + Claude APIのみで動作<br>
    ⚠️ 音声認識はApple/Googleサーバーを経由 / HTTPS必須
  </div>
</div>

<div id="statusbar">
  <div class="badge boff" id="b-mic">🎙 OFF</div>
  <div class="badge boff" id="b-ai">🤖 待機</div>
  <div class="stat">語数:<b id="s-words">0</b></div>
  <div class="stat">翻訳:<b id="s-trans">0</b>回</div>
  <div class="stat">平均遅延:<b id="s-lag">--</b>s</div>
  <div class="stat"><b id="s-el">00:00</b></div>
</div>

<div id="err"></div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('main')">🎙 メイン</button>
  <button class="tab-btn"        onclick="switchTab('summary')">🧠 まとめ</button>
</div>

<div id="main">
  <div id="tab-main" class="tab-pane active">
    <div id="split-top">
      <div id="transcript-committed" style="color:#555">（英語音声をここに表示）</div>
      <div id="transcript-interim"></div>
    </div>
    <div id="split-divider">
      <span id="split-divider-label">🇯🇵 日本語翻訳</span>
      <span id="rec-inline"></span>
    </div>
    <div id="split-bottom">
      <div id="jp-ph">
        翻訳結果がここに表示されます<br>
        <span style="font-size:10px;opacity:.5">録音開始後、数秒で最初の翻訳が届きます</span>
      </div>
    </div>
  </div>

  <div id="tab-summary" class="tab-pane">
    <div id="sum-hdr">
      <span id="sum-cd"></span>
      <button class="btn d" style="padding:5px 12px;font-size:11px;border-radius:10px"
              onclick="generateSummary(true)">📝 今すぐ</button>
    </div>
    <div id="sum-ph">
      録音開始後、<b style="color:var(--accent)">1分30秒ごと</b>に<br>
      英語全文を解析して全体像をまとめます
    </div>
  </div>
</div>

<div id="save-status"></div>

<div id="ctrl-bar">
  <button class="btn g" id="start-btn" onclick="startListening()">▶ 開始</button>
  <button class="btn r" id="stop-btn"  onclick="stopListening()" disabled>⏹ 停止</button>
  <button class="btn d" id="save-btn"  onclick="saveSession()">💾 保存</button>
  <button class="btn p"               onclick="clearAll()">🗑</button>
</div>

<div id="save-modal">
  <div id="save-modal-inner">
    <div id="save-modal-title">📄 保存内容</div>
    <textarea id="save-modal-text" readonly></textarea>
    <div id="save-modal-btns">
      <button class="btn g" style="flex:1" onclick="shareModalContent()">📤 共有</button>
      <button class="btn d" style="flex:1" onclick="closeSaveModal()">✕ 閉じる</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// 状態変数
// ============================================================
var isOn          = false;
var fullText      = '';       // 確定済み英語テキスト全体
var startTime     = null;
var elapsedLoop   = null;
var jpCount       = 0;

// 翻訳制御
var readPos       = 0;        // 翻訳済み末尾の文字位置
var lastTransAt   = 0;        // 最後に翻訳を開始した時刻 (ms)
var translating   = false;

// タイムラグ計測
// speechStartAt: 現バッチの最初のfinalテキストが届いた時刻
// 翻訳完了後にリセット、次の発話で再セット
var speechStartAt = 0;
var lagHistory    = [];

// 翻訳済みセグメント（英語ハイライト用）
// [{start: 文字位置, end: 文字位置}]
var segments      = [];

// 直近のinterim（翻訳後も消えないよう保持）
var lastInterim   = '';

// コンテキスト
var recentJp      = [];       // 直近の日本語訳（文脈用）

// 要約制御
var summaryPos    = 0;
var summaryCount  = 0;
var summaryBusy   = false;
var summaryTimer  = null;
var sumCdTimer    = null;
var summaryNextAt = 0;

// SpeechRecognition / meter
var recognition   = null;
var meterAnim     = null;

// 保存モーダル
var modalContent  = '';
var modalFilename = '';

// ============================================================
// 定数
// ============================================================
var MIN_WORDS           = 2;      // 翻訳開始最小語数（2語で即開始）
var MIN_WORDS_COLD      = 2;      // 初回翻訳最小語数
var MIN_WAIT_MS         = 100;    // 翻訳間の最短間隔 ms
var FORCE_MS            = 1200;   // 語数未満でも強制翻訳するタイムアウト
var CONTEXT_WORDS       = 150;    // Claudeに渡す英語コンテキスト語数（150語維持）
var SUMMARY_INTERVAL_MS = 90000;
var SUMMARY_MIN_WORDS   = 30;

// ============================================================
// 初期化
// ============================================================
(function init() {
  var ck  = localStorage.getItem('claude_key')      || '';
  var ctx = localStorage.getItem('session_context') || '';
  if (ck)  document.getElementById('claude-key').value      = ck;
  if (ctx) document.getElementById('session-context').value = ctx;
  if (ck)  document.getElementById('setup-panel').style.display = 'none';
})();

// ============================================================
// UI ユーティリティ
// ============================================================
function toggleSetup() {
  var p = document.getElementById('setup-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}
function saveKeys() {
  var k = document.getElementById('claude-key').value.trim();
  if (k) localStorage.setItem('claude_key', k);
}
function saveContext() {
  localStorage.setItem('session_context', document.getElementById('session-context').value);
}
function getKey() {
  return document.getElementById('claude-key').value.trim()
      || localStorage.getItem('claude_key') || '';
}
function getCtx() {
  return document.getElementById('session-context').value.trim() || '';
}
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['main','summary'][i] === name);
  });
  document.querySelectorAll('.tab-pane').forEach(function(p) {
    p.classList.toggle('active', p.id === 'tab-' + name);
  });
}
function setBadge(id, text, cls) {
  var el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = 'badge ' + cls; }
}
function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 9000);
}
function showSaveStatus(msg, autoHide, ms) {
  var el = document.getElementById('save-status');
  el.textContent = msg; el.style.display = 'block';
  if (autoHide) setTimeout(function() { el.style.display = 'none'; }, ms || 5000);
}
function updateElapsed() {
  if (!startTime) return;
  var s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('s-el').textContent =
    String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}
function updateBtns(rec) {
  document.getElementById('start-btn').disabled = rec;
  document.getElementById('stop-btn').disabled  = !rec;
  document.getElementById('start-btn').textContent = rec ? '🔴 録音中' : '▶ 開始';
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function recordLag(sec) {
  lagHistory.push(sec);
  if (lagHistory.length > 10) lagHistory.shift();
  var avg = lagHistory.reduce(function(a,b){return a+b;},0) / lagHistory.length;
  document.getElementById('s-lag').textContent = avg.toFixed(1);
}

// ============================================================
// 録音インジケータ
// ============================================================
function startMeter() {
  meterAnim = setInterval(function() {
    var el = document.getElementById('rec-inline');
    if (!el) return;
    var dots = ['●○○','○●○','○○●'][Math.floor(Date.now()/400)%3];
    el.textContent = isOn ? '🔴 ' + dots : '';
  }, 400);
}
function stopMeter() {
  clearInterval(meterAnim);
  var el = document.getElementById('rec-inline');
  if (el) el.textContent = '';
}

// ============================================================
// 英語原文の表示（ハイライト付き）
// ============================================================
function renderTranscript() {
  var el = document.getElementById('transcript-committed');
  if (!fullText) {
    el.innerHTML = '';
    return;
  }
  var html = '';
  var pos  = 0;
  var last = segments.length - 1;

  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    // セグメント前のギャップ（通常は空白のみ）
    if (pos < seg.start) {
      html += esc(fullText.slice(pos, seg.start));
    }
    var cls = (i === last) ? 'hl-latest' : 'hl-prev';
    html += '<span class="' + cls + '">'
          + esc(fullText.slice(seg.start, seg.end))
          + '</span>';
    pos = seg.end;
  }
  // 未翻訳の残り
  if (pos < fullText.length) {
    html += esc(fullText.slice(pos));
  }

  el.innerHTML   = html;
  el.style.color = '#bbb';

  // 最下部スクロール
  var top = document.getElementById('split-top');
  requestAnimationFrame(function() { top.scrollTop = top.scrollHeight; });
}

function updateInterim(interim) {
  lastInterim = interim || '';
  document.getElementById('transcript-interim').textContent = lastInterim;
}

// ============================================================
// Web Speech API
// ============================================================
function startListening() {
  if (isOn) return;
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); toggleSetup(); return; }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('⚠️ このブラウザは音声認識に対応していません（Safari / Chrome を使用）'); return; }

  recognition                = new SR();
  recognition.lang           = 'en-US';
  recognition.continuous     = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = function(event) {
    var interim = '';
    var final_  = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final_ += t;
      else interim += t;
    }

    if (final_.trim()) {
      // speechStartAt: 0のときだけセット（バッチの最初の語の到着時刻）
      if (speechStartAt === 0) speechStartAt = Date.now();

      fullText += final_.trim() + ' ';
      document.getElementById('s-words').textContent =
        fullText.trim().split(/\s+/).filter(Boolean).length;

      renderTranscript();
      maybeTranslate(true);
    } else if (interim.trim() && !translating) {
      // isFinalを待たず、interimが6語以上なら即翻訳（速度最優先）
      var iWords = interim.trim().split(/\s+/).filter(Boolean).length;
      if (iWords >= 6 && speechStartAt === 0) speechStartAt = Date.now();
      if (iWords >= 6) maybeTranslateInterim(interim.trim());
    }

    updateInterim(interim);
  };

  recognition.onend = function() {
    if (isOn) {
      setTimeout(function() {
        if (isOn && recognition) {
          try { recognition.start(); } catch(e) {}
        }
      }, 250);
    }
  };

  recognition.onerror = function(ev) {
    if (ev.error === 'no-speech' || ev.error === 'aborted') return;
    if (ev.error === 'network') {
      showErr('⚠️ ネットワークエラー（インターネット接続が必要です）');
      return;
    }
    console.warn('[STT]', ev.error);
  };

  isOn         = true;
  lastTransAt  = Date.now();
  speechStartAt = 0;

  try {
    recognition.start();
  } catch(e) {
    isOn = false;
    showErr('⚠️ 音声認識開始失敗: ' + e.message);
    return;
  }

  if (!startTime) {
    startTime   = Date.now();
    elapsedLoop = setInterval(updateElapsed, 1000);
  }
  setBadge('b-mic', '🔴 認識中', 'bon');
  updateBtns(true);
  document.getElementById('setup-panel').style.display = 'none';
  startMeter();
  startSummaryTimer();
}

function stopListening() {
  isOn = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  clearInterval(elapsedLoop);
  stopMeter();
  setBadge('b-mic', '⏹ 停止', 'boff');
  updateInterim('');
  updateBtns(false);
  stopSummaryTimer();
}

// ============================================================
// 翻訳タイミング制御
// ============================================================
function hasSentenceEnd(text) {
  return /[.!?](\s|$)/.test(text);
}

function maybeTranslate(immediate) {
  if (translating) return;
  var chunk = fullText.slice(readPos).trim();
  var words = chunk.split(/\s+/).filter(Boolean).length;
  var wait  = Date.now() - lastTransAt;

  if (wait < MIN_WAIT_MS) return;
  if (!chunk || words < 1) return;

  var threshold = recentJp.length === 0 ? MIN_WORDS_COLD : MIN_WORDS;

  if (words < threshold) {
    // 1語でも1.2秒経過なら強制翻訳
    if (words >= 1 && wait >= FORCE_MS) doTranslate();
    return;
  }

  if (hasSentenceEnd(chunk) || immediate || wait >= FORCE_MS) {
    doTranslate();
  }
}

// interim が十分長いとき、finalを待たず先行翻訳
var lastInterimTranslated = '';
function maybeTranslateInterim(interim) {
  if (translating) return;
  if (interim === lastInterimTranslated) return;
  var wait = Date.now() - lastTransAt;
  if (wait < MIN_WAIT_MS) return;
  // interimをfullTextに一時追加して翻訳（finalが来たら上書きされる）
  var combined = fullText + interim + ' ';
  var chunk = combined.slice(readPos).trim();
  if (chunk.split(/\s+/).filter(Boolean).length < 4) return;
  lastInterimTranslated = interim;
  doTranslateChunk(chunk, combined.length);
}

// 300ms ポーリング（速度優先）
setInterval(function() { if (isOn && !translating) maybeTranslate(false); }, 300);

// ============================================================
// Claude API 翻訳
// ============================================================
function doTranslate() {
  if (translating) return;
  var chunk = fullText.slice(readPos).trim();
  if (!chunk || chunk.split(/\s+/).filter(Boolean).length < 1) return;
  doTranslateChunk(chunk, fullText.length);
}

function doTranslateChunk(chunk, snapshotLen) {
  if (translating) return;
  if (!chunk) return;
  var key = getKey();
  if (!key) return;

  translating     = true;
  var segStart    = readPos + (fullText.slice(readPos).length - fullText.slice(readPos).trimStart().length);
  var snapshot    = snapshotLen;
  var batchStart  = speechStartAt > 0 ? speechStartAt : Date.now();
  lastTransAt     = Date.now();

  setBadge('b-ai', '🤖 翻訳中…', 'bwait');

  // コンテキスト構築（最短化 → API速度優先）
  var jpCtx  = recentJp.length ? recentJp[recentJp.length-1].slice(0,50) : '';
  var prevEn = fullText.slice(0, readPos).trim()
                 .split(/\s+/).filter(Boolean).slice(-CONTEXT_WORDS).join(' ');
  var ctx    = getCtx();

  // プロンプト: 極限まで短く
  var promptParts = ['同時通訳。英語→日本語。訳文のみ。'];
  if (ctx)    promptParts.push('[背景]' + ctx);
  if (jpCtx)  promptParts.push('[前訳]' + jpCtx);
  if (prevEn) promptParts.push('[文脈]' + prevEn);
  promptParts.push('[訳]' + chunk);
  var prompt = promptParts.join('\n');

  claudeRequest({
    model:      'claude-haiku-4-5-20251001',
    max_tokens: 200,
    messages:   [{ role: 'user', content: prompt }]
  }, 18000)
  .then(function(res) {
    var rawJp = (res && res.content && res.content[0] && res.content[0].text)
                ? res.content[0].text.trim() : '';
    if (!rawJp) throw new Error('翻訳結果が空です');

    var jpText = ensureComplete(rawJp);

    // タイムラグ
    var lagSec = ((Date.now() - batchStart) / 1000).toFixed(1);
    recordLag(parseFloat(lagSec));

    // セグメント登録（英語ハイライト）
    segments.push({ start: segStart, end: snapshot });
    readPos = snapshot;

    // バッチ開始時刻リセット（次の発話で再セット）
    speechStartAt = 0;

    setBadge('b-ai', '🤖 完了', 'bon');
    recentJp.push(jpText);
    if (recentJp.length > 8) recentJp.shift();

    jpCount++;
    document.getElementById('s-trans').textContent = jpCount;

    addJpCard(jpText, chunk, lagSec);
    renderTranscript();  // ハイライト更新

  })
  .catch(function(e) {
    if (e && e.name !== 'AbortError') {
      showErr('⚠️ 翻訳エラー: ' + e.message);
      setBadge('b-ai', '⚠️ エラー', 'boff');
    }
  })
  .finally(function() {
    translating = false;
    setTimeout(function() { maybeTranslate(false); }, 100);
  });
}

function ensureComplete(text) {
  var t = text.trim();
  if (!t) return t;
  if (/[。！？]$/.test(t)) return t;
  var last = Math.max(t.lastIndexOf('。'), t.lastIndexOf('！'), t.lastIndexOf('？'));
  if (last > 0 && last >= t.length * 0.3) return t.slice(0, last + 1);
  return t + '。';
}

// ============================================================
// 翻訳カード追加（最新=紫、過去=薄く）
// ============================================================
function addJpCard(jpText, srcText, lagSec) {
  var bottom = document.getElementById('split-bottom');
  var ph     = document.getElementById('jp-ph');
  if (ph) ph.remove();

  // 既存カードから latest クラスを外す
  document.querySelectorAll('.jp-card.latest').forEach(function(c) {
    c.classList.remove('latest');
  });

  var card = document.createElement('div');
  card.className = 'jp-card latest';

  var t = new Date().toLocaleTimeString('ja-JP');
  var srcHtml = srcText
    ? '<div class="jp-src">' + esc(srcText.slice(0,110)) + (srcText.length>110?'…':'') + '</div>'
    : '';
  card.innerHTML =
    '<div class="jp-meta">'
    + '<span>🕐 ' + t + ' &nbsp;#' + jpCount + '</span>'
    + '<span class="jp-lag">⏱ ' + lagSec + 's</span>'
    + '</div>'
    + '<div class="jp-text">' + esc(jpText).replace(/\n/g,'<br>') + '</div>'
    + srcHtml;

  bottom.appendChild(card);
  requestAnimationFrame(function() { bottom.scrollTop = bottom.scrollHeight; });
}

// ============================================================
// Claude API リクエスト（iOS AbortController 対策）
// ============================================================
function claudeRequest(body, timeoutMs) {
  var controller = new AbortController();
  var tid = setTimeout(function() { controller.abort(); }, timeoutMs || 30000);

  return fetch('https://api.anthropic.com/v1/messages', {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'x-api-key':     getKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body:   JSON.stringify(body),
    signal: controller.signal
  })
  .then(function(res) {
    clearTimeout(tid);
    if (!res.ok) {
      return res.text().catch(function(){return '';}).then(function(txt) {
        throw new Error('Claude API ' + res.status + ': ' + txt.slice(0,120));
      });
    }
    return res.json().then(function(data) {
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      return data;
    });
  })
  .catch(function(e) {
    clearTimeout(tid);
    if (e.message === 'Load failed' || e.message === 'Failed to fetch') {
      throw new Error('通信エラー（APIキーまたはネットワークを確認してください）');
    }
    throw e;
  });
}

// ============================================================
// 要約タイマー
// ============================================================
function updateSumCd() {
  var el = document.getElementById('sum-cd');
  if (!el) return;
  if (!isOn || !summaryNextAt) { el.textContent = ''; return; }
  var rem = Math.max(0, Math.ceil((summaryNextAt - Date.now()) / 1000));
  el.textContent = '次の要約まで ' + Math.floor(rem/60) + ':' + String(rem%60).padStart(2,'0');
}
function startSummaryTimer() {
  stopSummaryTimer();
  summaryNextAt = Date.now() + SUMMARY_INTERVAL_MS;
  (function tick() {
    summaryTimer = setTimeout(function() {
      generateSummary(false).then(function() {
        if (isOn) {
          summaryNextAt = Date.now() + SUMMARY_INTERVAL_MS;
          tick();
        }
      });
    }, SUMMARY_INTERVAL_MS);
  })();
  sumCdTimer = setInterval(updateSumCd, 1000);
  updateSumCd();
}
function stopSummaryTimer() {
  clearTimeout(summaryTimer);
  clearInterval(sumCdTimer);
  summaryTimer = sumCdTimer = null;
  summaryNextAt = 0;
  updateSumCd();
}

// ============================================================
// 要約生成
// ============================================================
function generateSummary(manual) {
  if (summaryBusy) { if (manual) showErr('⚠️ 分析中です'); return Promise.resolve(); }
  var newWords   = fullText.slice(summaryPos).trim().split(/\s+/).filter(Boolean).length;
  var totalWords = fullText.trim().split(/\s+/).filter(Boolean).length;
  if (newWords < SUMMARY_MIN_WORDS) {
    if (manual) showErr('⚠️ テキスト不足（+' + newWords + '語 / 最低' + SUMMARY_MIN_WORDS + '語必要）');
    return Promise.resolve();
  }
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); return Promise.resolve(); }

  summaryBusy = true;
  summaryCount++;
  var capturedPos = fullText.length;
  var now     = new Date();
  var timeStr = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  var pane    = document.getElementById('tab-summary');
  var ph      = document.getElementById('sum-ph');

  pane.querySelectorAll('.smr-card').forEach(function(c){ c.style.opacity='0.3'; });
  if (ph) ph.remove();

  var card = document.createElement('div');
  card.className = 'smr-card loading';
  card.innerHTML =
    '<div class="smr-meta"><span>' + timeStr + ' 更新' + summaryCount + '回目</span>'
    + '<span class="smr-meta-label">🧠 全文' + totalWords + '語 解析中…</span></div>'
    + '<div class="smr-body" style="font-size:12px;color:var(--muted);padding:8px 0">全体像を解析しています…</div>';

  var hdr = document.getElementById('sum-hdr');
  if (hdr && hdr.nextSibling) pane.insertBefore(card, hdr.nextSibling);
  else pane.appendChild(card);

  var ctx = getCtx();
  var userMsg = (ctx ? '【背景】' + ctx + '\n\n' : '')
              + '【全文 ' + totalWords + '語】\n' + fullText.trim();

  return claudeRequest({
    model:      'claude-haiku-4-5-20251001',
    max_tokens: 2048,
    system: '同時通訳補助AI。英語スピーチ全文を精読し、全体像・論点・構造を日本語で整理。\n\n【出力フォーマット】\n▌ 概要\n（3〜4文で主旨）\n\n## 主な論点・主張\n• 5〜8点（各1〜2文）\n\n## 話の流れ\n• 冒頭 → 中盤 → 現時点の着地点\n\n## キーワード\n（重要用語を「/」区切り）\n\n前置き不要。上記フォーマットのみ出力。',
    messages: [{ role: 'user', content: userMsg }]
  }, 90000)
  .then(function(data) {
    var summary = data && data.content && data.content[0] ? data.content[0].text.trim() : '';
    if (!summary) throw new Error('要約結果が空です');
    summaryPos = capturedPos;
    pane.querySelectorAll('.smr-card').forEach(function(c){ if(c!==card) c.remove(); });
    card.classList.remove('loading');
    card.querySelector('.smr-meta .smr-meta-label').textContent = '🧠 全文' + totalWords + '語';
    card.querySelector('.smr-body').outerHTML = '<div>' + parseSummary(summary) + '</div>';
    pane.scrollTop = 0;
  })
  .catch(function(e) {
    card.classList.add('error');
    card.querySelector('.smr-body').innerHTML =
      '<span style="color:var(--red);font-size:12px">⚠️ ' + esc(e.message) + '</span>';
    summaryCount--;
    console.error('[summary]', e);
  })
  .finally(function() { summaryBusy = false; });
}

function parseSummary(text) {
  var lines = text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
  var html='', bullets=[], sec='', inOv=false;
  function flush() {
    if (!bullets.length) return;
    if (sec) html += '<div class="smr-section-title">' + esc(sec) + '</div>';
    html += '<ul class="smr-points">' + bullets.map(function(b){
      return '<li class="smr-point">' + esc(b) + '</li>';
    }).join('') + '</ul>';
    bullets=[]; sec='';
  }
  for (var i=0; i<lines.length; i++) {
    var l = lines[i];
    if (/^▌/.test(l)) {
      inOv=true;
      var r=l.replace(/^▌\s*(概要)?\s*/i,'').trim();
      if(r) html+='<div class="smr-overview">'+esc(r);
      continue;
    }
    if (/^##/.test(l)) {
      if(inOv){html+='</div>';inOv=false;}
      flush(); sec=l.replace(/^#+\s*/,'').trim(); continue;
    }
    if (/^[•・\-]/.test(l)||/^\d+[\.\)]/.test(l)) {
      if(inOv){html+='</div>';inOv=false;}
      bullets.push(l.replace(/^[\s•・\-\d\.\)]+/,'').trim()); continue;
    }
    if (/^(キーワード|Keywords)/i.test(l)) {
      if(inOv){html+='</div>';inOv=false;}
      flush();
      html+='<div class="smr-section-title">キーワード</div>'
           +'<div class="smr-keywords">'+esc(l.replace(/^[^:：]*[：:]\s*/,'').trim())+'</div>';
      continue;
    }
    if (inOv) { html+='<br>'+esc(l); continue; }
    html+='<p style="font-size:12px;color:var(--muted);margin:3px 0;line-height:1.6">'+esc(l)+'</p>';
  }
  if (inOv) html+='</div>';
  flush();
  return html;
}

// ============================================================
// 未翻訳フラッシュ（保存前）
// ============================================================
function sleep(ms) { return new Promise(function(r){setTimeout(r,ms);}); }

function flushTranslations() {
  var loops = 0;
  function next() {
    if (loops++ >= 8) return Promise.resolve();
    return new Promise(function(resolve) {
      function wait() {
        if (translating) { setTimeout(wait, 200); return; }
        var rem = fullText.slice(readPos).trim();
        if (rem.split(/\s+/).filter(Boolean).length < 2) { resolve(); return; }
        lastTransAt = 0;
        doTranslate();
        setTimeout(function() { next().then(resolve); }, 2000);
      }
      wait();
    });
  }
  return next();
}

// ============================================================
// セッション保存
// ============================================================
function saveSession() {
  if (isOn) stopListening();
  var wc = fullText.trim().split(/\s+/).filter(Boolean).length;
  if (wc < 10) { showErr('⚠️ テキストが少なすぎます'); return; }
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); return; }

  showSaveStatus('🔄 未翻訳テキストを翻訳中…');
  flushTranslations().then(function() {
    var now   = new Date();
    var stamp = now.toISOString().slice(0,16).replace('T','_').replace(':','-');
    var ctx   = getCtx();

    var transcript = [
      '# Live Interpreter — English Transcript',
      'Date   : ' + now.toLocaleString('ja-JP'),
      'Words  : ' + wc,
      ctx ? 'Context: ' + ctx : null,
      '', '---', '', fullText.trim()
    ].filter(function(l){return l!==null;}).join('\n');

    saveFile(transcript, 'transcript_' + stamp + '.txt');
    showSaveStatus('🤖 レポートをClaudeで生成中…');

    var userMsg = ['日時: '+now.toLocaleString('ja-JP'), '語数: '+wc+'語',
                   ctx?'背景: '+ctx:null, '', '【英語スピーチ全文】', fullText.trim()]
                  .filter(Boolean).join('\n');

    return claudeRequest({
      model:      'claude-haiku-4-5-20251001',
      max_tokens: 3000,
      system: '会議・講演の議事録作成専門家。英語スピーチ全文を分析し構造化された日本語レポートをMarkdown形式で作成。\n\n# 📋 スピーチ要約レポート\n\n## 基本情報\n## エグゼクティブサマリー\n## 主要な内容・論点\n## 話の構成・流れ\n## キーワード・専門用語\n## アクションアイテム（なければ省略）\n\n前置き不要。完全な日本語で。',
      messages: [{ role: 'user', content: userMsg }]
    }, 90000)
    .then(function(data) {
      var report = data && data.content && data.content[0] ? data.content[0].text.trim() : '';
      saveFile(report, 'report_' + stamp + '.md');
      showSaveStatus('✅ 保存完了！ 2つのファイルをダウンロードしました', true, 7000);
    })
    .catch(function(e) {
      console.error('[save-report]', e);
      showErr('⚠️ レポート生成エラー: ' + e.message);
      showSaveModal('レポート生成に失敗しました。\n\nエラー: ' + e.message,
                    'report_' + stamp + '.md');
      showSaveStatus('⚠️ レポート生成失敗（文字起こしは保存済み）', true, 8000);
    });
  });
}

function saveFile(content, filename) {
  var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  if (navigator.share && navigator.canShare &&
      navigator.canShare({ files:[new File([blob], filename, {type:'text/plain'})] })) {
    navigator.share({
      files: [new File([blob], filename, {type:'text/plain'})],
      title: filename
    }).catch(function(e){ if(e.name!=='AbortError') saveFileBlob(blob, filename, content); });
    return;
  }
  saveFileBlob(blob, filename, content);
}
function saveFileBlob(blob, filename, content) {
  try {
    var url = URL.createObjectURL(blob);
    var a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  } catch(e) {
    showSaveModal(content, filename);
  }
}
function showSaveModal(content, filename) {
  modalContent = content; modalFilename = filename;
  document.getElementById('save-modal-text').value = content;
  document.getElementById('save-modal-title').textContent = '📄 ' + filename;
  document.getElementById('save-modal').classList.add('open');
}
function closeSaveModal() {
  document.getElementById('save-modal').classList.remove('open');
}
function shareModalContent() {
  if (navigator.share) {
    navigator.share({ title: modalFilename, text: modalContent })
      .then(function(){ closeSaveModal(); })
      .catch(function(){copyModal();});
  } else {
    copyModal();
  }
}
function copyModal() {
  navigator.clipboard.writeText(modalContent)
    .then(function(){ showErr('📋 クリップボードにコピーしました'); closeSaveModal(); })
    .catch(function(){ showErr('⚠️ コピーに失敗しました。テキストを手動で選択してコピーしてください。'); });
}
