<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🎙️ Live Interpreter v1.5</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0f1117; --panel:#1a1d2e; --panel2:#141624; --border:#2a2d45;
      --accent:#4dabf7; --green:#40c057; --red:#fa5252;
      --yellow:#ffd43b; --purple:#cc5de8; --muted:#7a7a9a; --text:#e0e0e0;
    }
    html,body { height:100%; overflow:hidden; background:var(--bg); }
    body { font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
           color:var(--text); display:flex; flex-direction:column; }

    header { background:var(--panel); border-bottom:1px solid var(--border);
             padding:9px 13px; display:flex; align-items:center;
             justify-content:space-between; flex-shrink:0; gap:8px; }
    header h1 { font-size:15px; color:var(--accent); white-space:nowrap; }
    #setup-toggle { font-size:11px; color:var(--muted); background:#2a2d45;
                    border:1px solid var(--border); border-radius:12px;
                    padding:4px 10px; cursor:pointer; flex-shrink:0; }

    #setup-panel { background:var(--panel2); border-bottom:2px solid var(--accent);
                   padding:11px 13px; flex-shrink:0; }
    .setup-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:7px; }
    .setup-row:last-of-type { margin-bottom:0; }
    .setup-label { font-size:11px; color:var(--muted); padding-top:7px;
                   width:78px; flex-shrink:0; white-space:nowrap; }
    .setup-input { flex:1; background:var(--panel); border:1px solid var(--border);
                   color:var(--text); padding:6px 9px; border-radius:6px;
                   font-size:13px; font-family:monospace; min-width:0; }
    .setup-input:focus { outline:none; border-color:var(--accent); }
    textarea.setup-input { font-family:inherit; resize:none; font-size:12px; height:46px; }
    .info-note { margin-top:8px; padding:6px 10px; background:#1a2a1a;
                 border-radius:6px; font-size:11px; color:#69db7c; line-height:1.55;
                 border-left:3px solid #40c057; }

    #statusbar { background:var(--panel2); border-bottom:1px solid var(--border);
                 padding:4px 13px; display:flex; gap:7px; align-items:center;
                 flex-shrink:0; flex-wrap:wrap; }
    .badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; border:1px solid; }
    .boff  { background:#2a1a1a; color:#ff6b6b; border-color:#ff6b6b; }
    .bon   { background:#1a3a1a; color:#69db7c; border-color:#69db7c; }
    .bwait { background:#2a2a1a; color:#ffd43b; border-color:#ffd43b; }
    .stat  { font-size:11px; color:var(--muted); }
    .stat b { color:var(--accent); }

    #err { display:none; background:#3a1a1a; color:var(--red);
           padding:5px 13px; font-size:12px; flex-shrink:0; }
    #err.show { display:block; }

    #tabs { background:var(--panel); border-bottom:1px solid var(--border);
            display:flex; flex-shrink:0; }
    .tab-btn { flex:1; padding:9px 4px; border:none; background:none;
               color:var(--muted); font-size:13px; font-weight:bold; cursor:pointer;
               border-bottom:2px solid transparent; transition:all .15s;
               -webkit-touch-callout:none; -webkit-user-select:none; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    #main { flex:1; min-height:0; overflow:hidden; position:relative; }
    .tab-pane { position:absolute; inset:0; display:none; flex-direction:column; }
    .tab-pane.active { display:flex; }

    #split-top { flex:0 0 34%; min-height:0; overflow-y:scroll; padding:8px 12px 6px;
                 -webkit-overflow-scrolling:touch; background:var(--bg); }
    #split-divider { flex-shrink:0; height:28px; background:var(--panel2);
                     border-top:1px solid var(--border); border-bottom:1px solid var(--border);
                     display:flex; align-items:center; justify-content:space-between;
                     padding:0 12px; }
    #split-divider-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
    #rec-inline { font-size:11px; color:var(--yellow); }
    #split-bottom { flex:1; min-height:0; overflow-y:scroll; padding:8px 12px 12px;
                    -webkit-overflow-scrolling:touch; }
    #tab-summary  { overflow-y:scroll; -webkit-overflow-scrolling:touch; padding:10px 12px 14px; }

    /* 英語原文 */
    #transcript-committed { font-size:13px; line-height:1.9; color:#bbb; word-break:break-word; }
    #transcript-interim   { font-size:13px; line-height:1.9; color:var(--yellow);
                             word-break:break-word; opacity:.8; }
    .hl-latest { background:rgba(204,93,232,0.42); border-bottom:2px solid #cc5de8;
                 border-radius:3px; padding:1px 2px; }
    .hl-prev   { background:rgba(77,171,247,0.15); border-bottom:1px solid #4dabf755;
                 border-radius:3px; padding:1px 2px; }

    /* 翻訳カード */
    .jp-card { background:var(--panel2); border:1px solid #4dabf722;
               border-radius:10px; padding:11px 13px; margin-bottom:9px; animation:fi .25s ease; }
    .jp-card.latest { border-color:var(--purple); box-shadow:0 0 10px #cc5de844; }
    @keyframes fi { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
    .jp-meta { font-size:10px; color:var(--muted); margin-bottom:5px;
               display:flex; justify-content:space-between; align-items:center; }
    .jp-lag  { background:#1a1a2e; border:1px solid var(--purple); border-radius:8px;
               padding:1px 6px; font-size:10px; color:var(--purple); }
    .jp-text { font-size:16px; line-height:1.85; color:#e8f4ff; }
    .jp-src  { margin-top:6px; padding-top:6px; border-top:1px solid var(--border);
               font-size:11px; color:var(--muted); line-height:1.5; }
    #jp-ph   { color:var(--muted); font-size:12px; text-align:center; padding:32px 0; line-height:1.8; }

    /* 要約 */
    .smr-card { background:var(--panel2); border:1px solid #40c05733;
                border-radius:10px; padding:12px 13px; margin-bottom:9px; animation:fi .3s ease; }
    .smr-card.loading { opacity:.65; }
    .smr-card.error   { border-color:#fa525244; }
    .smr-meta { font-size:10px; color:var(--muted); margin-bottom:7px;
                display:flex; justify-content:space-between; align-items:center; }
    .smr-meta-label { background:#40c05722; color:#40c057; border:1px solid #40c05744;
                      border-radius:10px; padding:1px 8px; font-size:10px; }
    .smr-overview  { font-size:13px; line-height:1.75; color:#d4f5e0; background:#1a2e1a;
                     border-left:3px solid #40c057; padding:8px 10px; border-radius:4px; margin-bottom:9px; }
    .smr-section-title { font-size:10px; font-weight:bold; color:#40c057; letter-spacing:.8px;
                         text-transform:uppercase; margin:9px 0 4px; padding-bottom:3px;
                         border-bottom:1px solid #40c05733; }
    .smr-points { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px; }
    .smr-point  { font-size:13px; line-height:1.75; color:#d4f5e0; padding-left:15px; position:relative; }
    .smr-point::before { content:'•'; position:absolute; left:0; color:#40c057; }
    .smr-keywords { font-size:12px; color:var(--muted); line-height:1.6;
                    background:#0f1117; border-radius:4px; padding:5px 8px; margin-top:3px; }
    #sum-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    #sum-cd  { font-size:11px; color:var(--muted); }
    #sum-ph  { color:var(--muted); font-size:12px; text-align:center; padding:40px 0; line-height:1.8; }

    #save-modal { display:none; position:fixed; inset:0; background:#000a; z-index:100; align-items:flex-end; }
    #save-modal.open { display:flex; }
    #save-modal-inner { background:var(--panel); border-radius:16px 16px 0 0; padding:16px;
                        width:100%; max-height:75vh; display:flex; flex-direction:column; gap:10px; }
    #save-modal-title { font-size:14px; font-weight:bold; color:var(--accent); }
    #save-modal-text  { flex:1; min-height:0; background:var(--bg); border:1px solid var(--border);
                        border-radius:8px; padding:10px; color:#ccc; font-size:12px;
                        font-family:monospace; overflow-y:scroll; resize:none;
                        -webkit-overflow-scrolling:touch; white-space:pre-wrap; }
    #save-modal-btns  { display:flex; gap:8px; }
    #save-status { display:none; background:#1a2a3a; color:var(--accent);
                   padding:7px 13px; font-size:12px; text-align:center;
                   flex-shrink:0; border-top:1px solid #4dabf744; }
    #ctrl-bar { background:var(--panel); border-top:1px solid var(--border);
                padding:9px 12px; display:flex; gap:6px; flex-shrink:0;
                justify-content:center; flex-wrap:wrap; }
    .btn { padding:10px 18px; border:none; border-radius:22px; cursor:pointer;
           font-size:13px; font-weight:bold; transition:opacity .15s;
           -webkit-touch-callout:none; -webkit-user-select:none; white-space:nowrap; }
    .btn:active { opacity:.65; }
    .btn:disabled { opacity:.35; pointer-events:none; }
    .g { background:var(--green); color:#fff; }
    .r { background:var(--red); color:#fff; }
    .d { background:#3a3d55; color:#ccc; }
    .p { background:var(--purple); color:#fff; font-size:12px; padding:10px 14px; }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>

<header>
  <h1>🎙️ Live Interpreter
    <span style="font-size:10px;color:var(--muted);font-weight:normal"> v1.5 · Claude</span>
  </h1>
  <button id="setup-toggle" onclick="toggleSetup()">⚙️ 設定</button>
</header>

<div id="setup-panel">
  <div class="setup-row">
    <span class="setup-label">🤖 Claude Key</span>
    <input type="password" id="claude-key" class="setup-input"
           placeholder="sk-ant-api03-..." oninput="saveKeys()">
  </div>
  <div class="setup-row">
    <span class="setup-label">📋 背景情報</span>
    <textarea id="session-context" class="setup-input"
              placeholder="例: AI国際カンファレンス。DeFiの議論。" oninput="saveContext()"></textarea>
  </div>
  <div class="info-note">
    ✅ OpenAI不要 — ブラウザ内蔵STT + Claude APIのみで動作<br>
    ⚠️ 音声認識はApple/Googleサーバーを経由 / HTTPS必須
  </div>
</div>

<div id="statusbar">
  <div class="badge boff" id="b-mic">🎙 OFF</div>
  <div class="badge boff" id="b-ai">🤖 待機</div>
  <div class="stat">語数:<b id="s-words">0</b></div>
  <div class="stat">翻訳:<b id="s-trans">0</b>回</div>
  <div class="stat">平均遅延:<b id="s-lag">--</b>s</div>
  <div class="stat"><b id="s-el">00:00</b></div>
</div>
<div id="err"></div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('main')">🎙 メイン</button>
  <button class="tab-btn"        onclick="switchTab('summary')">🧠 まとめ</button>
</div>

<div id="main">
  <div id="tab-main" class="tab-pane active">
    <div id="split-top">
      <div id="transcript-committed" style="color:#555">（英語音声をここに表示）</div>
      <div id="transcript-interim"></div>
    </div>
    <div id="split-divider">
      <span id="split-divider-label">🇯🇵 日本語翻訳</span>
      <span id="rec-inline"></span>
    </div>
    <div id="split-bottom">
      <div id="jp-ph">翻訳結果がここに表示されます<br>
        <span style="font-size:10px;opacity:.5">録音開始後、数秒で最初の翻訳が届きます</span>
      </div>
    </div>
  </div>

  <div id="tab-summary" class="tab-pane">
    <div id="sum-hdr">
      <span id="sum-cd"></span>
      <button class="btn d" style="padding:5px 12px;font-size:11px;border-radius:10px"
              onclick="generateSummary(true)">📝 今すぐ</button>
    </div>
    <div id="sum-ph">録音開始後、<b style="color:var(--accent)">1分30秒ごと</b>に<br>英語全文を解析して全体像をまとめます</div>
  </div>
</div>

<div id="save-status"></div>
<div id="ctrl-bar">
  <button class="btn g" id="start-btn" onclick="startListening()">▶ 開始</button>
  <button class="btn r" id="stop-btn"  onclick="stopListening()" disabled>⏹ 停止</button>
  <button class="btn d" id="save-btn"  onclick="saveSession()">💾 保存</button>
  <button class="btn p"               onclick="clearAll()">🗑</button>
</div>

<div id="save-modal">
  <div id="save-modal-inner">
    <div id="save-modal-title">📄 保存内容</div>
    <textarea id="save-modal-text" readonly></textarea>
    <div id="save-modal-btns">
      <button class="btn g" style="flex:1" onclick="shareModal()">📤 共有</button>
      <button class="btn d" style="flex:1" onclick="closeModal()">✕ 閉じる</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────
// 状態
// ─────────────────────────────────────────────
var isOn         = false;
var fullText     = '';       // 確定済み英語全体
var readPos      = 0;        // 翻訳済み末尾の文字位置
var translating  = false;
var lastTransAt  = 0;        // 最後に翻訳開始した時刻

// ラグ計測: 最初にinterimが来た瞬間からスタート
var speechStartAt = 0;       // 現バッチの発話開始時刻（interim到着で記録）
var lagHistory    = [];

// ハイライト
var segments      = [];      // [{start, end}]

// 認識
var recognition   = null;
var meterAnim     = null;
var chunkTimer    = null;    // 無音検知リスタートタイマー
var lastSpeechAt  = 0;       // 最後にinterim/finalが届いた時刻

// コンテキスト
var recentJp      = [];      // 直近の日本語訳

// 要約
var summaryPos    = 0;
var summaryCount  = 0;
var summaryBusy   = false;
var summaryTimer  = null;
var sumCdTimer    = null;
var summaryNextAt = 0;

// タイマー
var startTime    = null;
var elapsedLoop  = null;

// モーダル
var modalContent = '';
var modalName    = '';

// ─────────────────────────────────────────────
// 定数
// ─────────────────────────────────────────────
var PAUSE_MS    = 1800;   // この時間無音が続いたらリスタート（取りこぼし防止のため少し長め）
var CHUNK_MAX   = 7000;   // 最大待機 ms（無音なくても強制リスタート）
var MIN_WAIT_MS = 500;    // 翻訳間の最短間隔
var FORCE_MS    = 6000;   // 語数未満でも強制翻訳するタイムアウト
var MIN_WORDS   = 12;     // 翻訳開始語数（意味のある単位・短文断片を防ぐ）
var CTX_WORDS   = 150;    // コンテキスト語数（文意把握用・訳出しない）
var SUMMARY_MS  = 90000;
var SUMMARY_MIN = 30;

// ─────────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────────
(function() {
  var k = localStorage.getItem('claude_key') || '';
  var c = localStorage.getItem('session_ctx') || '';
  if (k) document.getElementById('claude-key').value = k;
  if (c) document.getElementById('session-context').value = c;
  if (k) document.getElementById('setup-panel').style.display = 'none';
})();

// ─────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────
function toggleSetup() {
  var p = document.getElementById('setup-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}
function saveKeys() {
  var k = document.getElementById('claude-key').value.trim();
  if (k) localStorage.setItem('claude_key', k);
}
function saveContext() {
  localStorage.setItem('session_ctx', document.getElementById('session-context').value);
}
function getKey() {
  return document.getElementById('claude-key').value.trim()
      || localStorage.getItem('claude_key') || '';
}
function getCtx() {
  return document.getElementById('session-context').value.trim() || '';
}
function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', ['main','summary'][i]===n);
  });
  document.querySelectorAll('.tab-pane').forEach(function(p){
    p.classList.toggle('active', p.id==='tab-'+n);
  });
}
function setBadge(id, text, cls) {
  var el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = 'badge '+cls; }
}
function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 9000);
}
function setSaveStatus(msg, hide, ms) {
  var el = document.getElementById('save-status');
  el.textContent = msg; el.style.display = 'block';
  if (hide) setTimeout(function(){ el.style.display='none'; }, ms||5000);
}
function updateElapsed() {
  if (!startTime) return;
  var s = Math.floor((Date.now()-startTime)/1000);
  document.getElementById('s-el').textContent =
    String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function updateBtns(rec) {
  document.getElementById('start-btn').disabled = rec;
  document.getElementById('stop-btn').disabled  = !rec;
  document.getElementById('start-btn').textContent = rec ? '🔴 録音中' : '▶ 開始';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function recordLag(s) {
  lagHistory.push(s);
  if (lagHistory.length > 10) lagHistory.shift();
  var avg = lagHistory.reduce(function(a,b){return a+b;},0)/lagHistory.length;
  document.getElementById('s-lag').textContent = avg.toFixed(1);
}

// ─────────────────────────────────────────────
// 録音インジケータ
// ─────────────────────────────────────────────
function startMeter() {
  meterAnim = setInterval(function(){
    var el = document.getElementById('rec-inline');
    if (el) el.textContent = isOn ? '🔴 '+['●○○','○●○','○○●'][Math.floor(Date.now()/400)%3] : '';
  }, 400);
}
function stopMeter() {
  clearInterval(meterAnim);
  var el = document.getElementById('rec-inline');
  if (el) el.textContent = '';
}

// ─────────────────────────────────────────────
// 英語原文レンダリング（ハイライト付き）
// ─────────────────────────────────────────────
function renderTranscript(interim) {
  var el = document.getElementById('transcript-committed');
  if (!fullText) {
    el.textContent = '（英語音声をここに表示）';
    el.style.color = '#555';
  } else {
    var html = '';
    var pos  = 0;
    var last = segments.length - 1;
    for (var i = 0; i < segments.length; i++) {
      var seg = segments[i];
      if (pos < seg.start) html += esc(fullText.slice(pos, seg.start));
      html += '<span class="'+(i===last?'hl-latest':'hl-prev')+'">'
            + esc(fullText.slice(seg.start, seg.end)) + '</span>';
      pos = seg.end;
    }
    if (pos < fullText.length) html += esc(fullText.slice(pos));
    el.innerHTML   = html;
    el.style.color = '#bbb';
  }
  document.getElementById('transcript-interim').textContent = interim || '';
  var top = document.getElementById('split-top');
  requestAnimationFrame(function(){ top.scrollTop = top.scrollHeight; });
}

// ─────────────────────────────────────────────
// 音声認識
// ─────────────────────────────────────────────
function buildRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  var r = new SR();
  r.lang           = 'en-US';
  r.continuous     = true;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onresult = function(event) {
    var interim = '';
    var finals  = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finals += t;
      else interim += t;
    }

    // ── 発話検知 ──
    // interimが来た瞬間を発話開始として記録（ラグ計測の起点）
    if ((interim.trim() || finals.trim()) && speechStartAt === 0) {
      speechStartAt = Date.now();
    }
    // 最後に声が届いた時刻を更新（無音検知リスタートに使用）
    if (interim.trim() || finals.trim()) {
      lastSpeechAt = Date.now();
      resetChunkTimer(); // 音声が続く限りリスタートを延期
    }

    if (finals.trim()) {
      fullText += finals.trim() + ' ';
      document.getElementById('s-words').textContent =
        fullText.trim().split(/\s+/).filter(Boolean).length;
      renderTranscript(interim);
      maybeTranslate(true);
    } else {
      renderTranscript(interim);
    }
  };

  r.onend = function() {
    clearTimeout(chunkTimer);
    clearTimeout(chunkMaxTimer);
    if (isOn) {
      setTimeout(function(){
        if (isOn) {
          try {
            recognition = buildRecognition();
            recognition.start();
            scheduleChunkRestart();
          } catch(e) {}
        }
      }, 80); // 再起動空白を最小化（取りこぼし防止）
    }
  };

  r.onerror = function(ev) {
    if (ev.error === 'no-speech' || ev.error === 'aborted') return;
    if (ev.error === 'network') { showErr('⚠️ ネットワークエラー'); return; }
    console.warn('[STT]', ev.error);
  };

  return r;
}

// 無音を検知してリスタート（文の途中では絶対に切らない）
// ・音声が届くたびに resetChunkTimer() でタイマーをリセット
// ・PAUSE_MS 無音が続いたら stop() → onend → 即再起動
// ・CHUNK_MAX を超えたら無音でも強制リスタート（安全弁）
var chunkMaxTimer = null;

function resetChunkTimer() {
  // 無音タイマーをリセット（音声継続中は何もしない）
  clearTimeout(chunkTimer);
  chunkTimer = setTimeout(function() {
    if (isOn && recognition) {
      try { recognition.stop(); } catch(e) {}
    }
  }, PAUSE_MS);
}

function scheduleChunkRestart() {
  // 最大待機タイマー（長時間無音ゼロでも一定時間後にリスタート）
  clearTimeout(chunkMaxTimer);
  chunkMaxTimer = setTimeout(function() {
    if (isOn && recognition) {
      try { recognition.stop(); } catch(e) {}
    }
  }, CHUNK_MAX);
  // 無音タイマーも開始
  resetChunkTimer();
}

function startListening() {
  if (isOn) return;
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); toggleSetup(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('⚠️ このブラウザは音声認識に対応していません（Safari / Chrome を使用）'); return; }

  isOn          = true;
  lastTransAt   = Date.now();
  speechStartAt = 0;

  recognition = buildRecognition();
  try {
    recognition.start();
  } catch(e) {
    isOn = false;
    showErr('⚠️ 音声認識開始失敗: ' + e.message);
    return;
  }

  scheduleChunkRestart();

  if (!startTime) {
    startTime   = Date.now();
    elapsedLoop = setInterval(updateElapsed, 1000);
  }
  setBadge('b-mic', '🔴 認識中', 'bon');
  updateBtns(true);
  document.getElementById('setup-panel').style.display = 'none';
  startMeter();
  startSummaryTimer();
}

function stopListening() {
  isOn = false;
  clearTimeout(chunkTimer);
  clearTimeout(chunkMaxTimer);
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  clearInterval(elapsedLoop);
  stopMeter();
  setBadge('b-mic', '⏹ 停止', 'boff');
  renderTranscript('');
  updateBtns(false);
  stopSummaryTimer();
}

// ─────────────────────────────────────────────
// 翻訳タイミング
// ─────────────────────────────────────────────
function hasSentEnd(t) { return /[.!?](\s|$)/.test(t); }

function maybeTranslate(immediate) {
  if (translating) return;
  var chunk = fullText.slice(readPos).trim();
  if (!chunk) return;
  var words = chunk.split(/\s+/).filter(Boolean).length;
  var wait  = Date.now() - lastTransAt;
  if (wait < MIN_WAIT_MS) return;

  if (words < MIN_WORDS) {
    if (wait >= FORCE_MS) doTranslate();
    return;
  }
  if (hasSentEnd(chunk) || immediate || wait >= FORCE_MS) {
    doTranslate();
  }
}

// 300ms ポーリング
setInterval(function(){ if (isOn && !translating) maybeTranslate(false); }, 300);

// ─────────────────────────────────────────────
// 翻訳実行
// ─────────────────────────────────────────────
function doTranslate() {
  if (translating) return;
  var newText = fullText.slice(readPos).trim();
  if (!newText || newText.split(/\s+/).filter(Boolean).length < 1) return;
  var key = getKey();
  if (!key) return;

  translating   = true;
  var segStart  = readPos + (fullText.slice(readPos).length - fullText.slice(readPos).trimStart().length);
  var snapshot  = fullText.length;
  // ラグ: interimが来た瞬間からのカウント
  var batchStart = speechStartAt > 0 ? speechStartAt : Date.now();
  lastTransAt   = Date.now();

  setBadge('b-ai', '🤖 翻訳中…', 'bwait');

  // コンテキスト（文意把握用。訳出しない）
  var prevEn = fullText.slice(0, readPos).trim()
                 .split(/\s+/).filter(Boolean).slice(-CTX_WORDS).join(' ');
  var lastJp = recentJp.length ? recentJp[recentJp.length-1].slice(0, 60) : '';
  var ctx    = getCtx();

  // プロンプト: [新規]のみを訳すよう明示
  var parts = [
    '同時通訳。[新規]のみ日本語に意訳。[文脈]は文意把握のみ・絶対に訳出しない。訳文のみ出力・句点で終わること。'
  ];
  if (ctx)    parts.push('[背景] ' + ctx);
  if (lastJp) parts.push('[直前訳] ' + lastJp);
  if (prevEn) parts.push('[文脈] ' + prevEn);
  parts.push('[新規] ' + newText);
  var prompt = parts.join('\n');

  claudeFetch({
    model:      'claude-haiku-4-5-20251001',
    max_tokens: 250,
    messages:   [{ role: 'user', content: prompt }]
  }, 18000)
  .then(function(data) {
    var raw = data && data.content && data.content[0] ? data.content[0].text.trim() : '';
    if (!raw) throw new Error('翻訳結果が空です');

    var jp = ensureKuten(raw);

    // ラグ計測（発話開始 → 翻訳表示）
    var lagSec = ((Date.now() - batchStart) / 1000).toFixed(1);
    recordLag(parseFloat(lagSec));

    // セグメント（ハイライト）
    segments.push({ start: segStart, end: snapshot });
    readPos = snapshot;

    // 次バッチのラグ計測リセット
    speechStartAt = 0;

    setBadge('b-ai', '🤖 完了', 'bon');
    recentJp.push(jp);
    if (recentJp.length > 6) recentJp.shift();

    jpCount++;
    document.getElementById('s-trans').textContent = jpCount;
    addCard(jp, newText, lagSec);
    renderTranscript('');

  })
  .catch(function(e) {
    if (e && e.name !== 'AbortError') {
      showErr('⚠️ 翻訳エラー: ' + e.message);
      setBadge('b-ai', '⚠️ エラー', 'boff');
    }
  })
  .finally(function() {
    translating = false;
    setTimeout(function(){ maybeTranslate(false); }, 100);
  });
}

var jpCount = 0;

function ensureKuten(t) {
  t = t.trim();
  if (!t) return t;
  if (/[。！？]$/.test(t)) return t;
  var i = Math.max(t.lastIndexOf('。'), t.lastIndexOf('！'), t.lastIndexOf('？'));
  if (i > 0 && i >= t.length * 0.3) return t.slice(0, i+1);
  return t + '。';
}

// ─────────────────────────────────────────────
// 翻訳カード追加
// ─────────────────────────────────────────────
function addCard(jp, src, lagSec) {
  var bottom = document.getElementById('split-bottom');
  var ph     = document.getElementById('jp-ph');
  if (ph) ph.remove();

  // 既存カードから latest を外す
  document.querySelectorAll('.jp-card.latest').forEach(function(c){
    c.classList.remove('latest');
  });

  var card = document.createElement('div');
  card.className = 'jp-card latest';
  var t = new Date().toLocaleTimeString('ja-JP');
  card.innerHTML =
    '<div class="jp-meta">'
    + '<span>🕐 '+t+' &nbsp;#'+jpCount+'</span>'
    + '<span class="jp-lag">⏱ '+lagSec+'s</span>'
    + '</div>'
    + '<div class="jp-text">'+esc(jp).replace(/\n/g,'<br>')+'</div>'
    + (src ? '<div class="jp-src">'+esc(src.slice(0,110))+(src.length>110?'…':'')+'</div>' : '');
  bottom.appendChild(card);
  requestAnimationFrame(function(){ bottom.scrollTop = bottom.scrollHeight; });
}

// ─────────────────────────────────────────────
// Claude API
// ─────────────────────────────────────────────
function claudeFetch(body, timeout) {
  var ctrl = new AbortController();
  var tid  = setTimeout(function(){ ctrl.abort(); }, timeout || 30000);
  return fetch('https://api.anthropic.com/v1/messages', {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'x-api-key':     getKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body:   JSON.stringify(body),
    signal: ctrl.signal
  })
  .then(function(res) {
    clearTimeout(tid);
    if (!res.ok) {
      return res.text().catch(function(){return '';}).then(function(txt){
        throw new Error('API '+res.status+': '+txt.slice(0,120));
      });
    }
    return res.json().then(function(d){
      if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
      return d;
    });
  })
  .catch(function(e) {
    clearTimeout(tid);
    if (e.message==='Load failed'||e.message==='Failed to fetch')
      throw new Error('通信エラー（APIキーまたはネットワークを確認してください）');
    throw e;
  });
}

// ─────────────────────────────────────────────
// 要約
// ─────────────────────────────────────────────
function updateSumCd() {
  var el = document.getElementById('sum-cd');
  if (!el) return;
  if (!isOn || !summaryNextAt) { el.textContent = ''; return; }
  var r = Math.max(0, Math.ceil((summaryNextAt - Date.now()) / 1000));
  el.textContent = '次の要約まで '+Math.floor(r/60)+':'+String(r%60).padStart(2,'0');
}
function startSummaryTimer() {
  stopSummaryTimer();
  summaryNextAt = Date.now() + SUMMARY_MS;
  (function tick(){
    summaryTimer = setTimeout(function(){
      generateSummary(false).then(function(){
        if (isOn) { summaryNextAt = Date.now() + SUMMARY_MS; tick(); }
      });
    }, SUMMARY_MS);
  })();
  sumCdTimer = setInterval(updateSumCd, 1000);
  updateSumCd();
}
function stopSummaryTimer() {
  clearTimeout(summaryTimer);
  clearInterval(sumCdTimer);
  summaryTimer = sumCdTimer = null;
  summaryNextAt = 0; updateSumCd();
}
function generateSummary(manual) {
  if (summaryBusy) { if (manual) showErr('⚠️ 分析中です'); return Promise.resolve(); }
  var nw = fullText.slice(summaryPos).trim().split(/\s+/).filter(Boolean).length;
  var tw = fullText.trim().split(/\s+/).filter(Boolean).length;
  if (nw < SUMMARY_MIN) {
    if (manual) showErr('⚠️ テキスト不足（+'+nw+'語 / 最低'+SUMMARY_MIN+'語必要）');
    return Promise.resolve();
  }
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); return Promise.resolve(); }

  summaryBusy = true; summaryCount++;
  var cap  = fullText.length;
  var now  = new Date();
  var ts   = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  var pane = document.getElementById('tab-summary');
  var ph   = document.getElementById('sum-ph'); if (ph) ph.remove();

  pane.querySelectorAll('.smr-card').forEach(function(c){ c.style.opacity='0.3'; });
  var card = document.createElement('div');
  card.className = 'smr-card loading';
  card.innerHTML = '<div class="smr-meta"><span>'+ts+' 更新'+summaryCount+'回目</span>'
    +'<span class="smr-meta-label">🧠 全文'+tw+'語 解析中…</span></div>'
    +'<div class="smr-body" style="font-size:12px;color:var(--muted);padding:8px 0">全体像を解析しています…</div>';
  var hdr = document.getElementById('sum-hdr');
  if (hdr&&hdr.nextSibling) pane.insertBefore(card,hdr.nextSibling); else pane.appendChild(card);

  var ctx = getCtx();
  return claudeFetch({
    model:'claude-haiku-4-5-20251001', max_tokens:2048,
    system:'同時通訳補助AI。英語スピーチ全文を精読し、全体像・論点・構造を日本語で整理。\n\n【出力フォーマット】\n▌ 概要\n（3〜4文で主旨）\n\n## 主な論点・主張\n• 5〜8点（各1〜2文）\n\n## 話の流れ\n• 冒頭 → 中盤 → 現時点の着地点\n\n## キーワード\n（重要用語を「/」区切り）\n\n前置き不要。',
    messages:[{role:'user',content:(ctx?'【背景】'+ctx+'\n\n':'')+'【全文 '+tw+'語】\n'+fullText.trim()}]
  }, 90000)
  .then(function(d){
    var s = d&&d.content&&d.content[0]?d.content[0].text.trim():'';
    if (!s) throw new Error('要約が空です');
    summaryPos = cap;
    pane.querySelectorAll('.smr-card').forEach(function(c){ if(c!==card)c.remove(); });
    card.classList.remove('loading');
    card.querySelector('.smr-meta .smr-meta-label').textContent = '🧠 全文'+tw+'語';
    card.querySelector('.smr-body').outerHTML = '<div>'+parseSummary(s)+'</div>';
    pane.scrollTop = 0;
  })
  .catch(function(e){
    card.classList.add('error');
    card.querySelector('.smr-body').innerHTML='<span style="color:var(--red);font-size:12px">⚠️ '+esc(e.message)+'</span>';
    summaryCount--;
  })
  .finally(function(){ summaryBusy=false; });
}
function parseSummary(text) {
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var html='',bullets=[],sec='',inOv=false;
  function flush(){
    if(!bullets.length)return;
    if(sec)html+='<div class="smr-section-title">'+esc(sec)+'</div>';
    html+='<ul class="smr-points">'+bullets.map(function(b){return'<li class="smr-point">'+esc(b)+'</li>';}).join('')+'</ul>';
    bullets=[];sec='';
  }
  lines.forEach(function(l){
    if(/^▌/.test(l)){inOv=true;var r=l.replace(/^▌\s*(概要)?\s*/i,'').trim();if(r)html+='<div class="smr-overview">'+esc(r);return;}
    if(/^##/.test(l)){if(inOv){html+='</div>';inOv=false;}flush();sec=l.replace(/^#+\s*/,'').trim();return;}
    if(/^[•・\-]/.test(l)||/^\d+[\.\)]/.test(l)){if(inOv){html+='</div>';inOv=false;}bullets.push(l.replace(/^[\s•・\-\d\.\)]+/,'').trim());return;}
    if(/^(キーワード|Keywords)/i.test(l)){if(inOv){html+='</div>';inOv=false;}flush();html+='<div class="smr-section-title">キーワード</div><div class="smr-keywords">'+esc(l.replace(/^[^:：]*[：:]\s*/,'').trim())+'</div>';return;}
    if(inOv){html+='<br>'+esc(l);return;}
    html+='<p style="font-size:12px;color:var(--muted);margin:3px 0;line-height:1.6">'+esc(l)+'</p>';
  });
  if(inOv)html+='</div>';flush();
  return html;
}

// ─────────────────────────────────────────────
// 保存
// ─────────────────────────────────────────────
function flushTrans() {
  var tries = 0;
  function next() {
    if (tries++ >= 8) return Promise.resolve();
    if (translating) return new Promise(function(r){ setTimeout(function(){ next().then(r); }, 300); });
    var rem = fullText.slice(readPos).trim();
    if (rem.split(/\s+/).filter(Boolean).length < 1) return Promise.resolve();
    lastTransAt = 0;
    doTranslate();
    return new Promise(function(r){ setTimeout(function(){ next().then(r); }, 2500); });
  }
  return next();
}
function saveSession() {
  if (isOn) stopListening();
  var wc = fullText.trim().split(/\s+/).filter(Boolean).length;
  if (wc < 10) { showErr('⚠️ テキストが少なすぎます'); return; }
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); return; }

  setSaveStatus('🔄 未翻訳テキストを翻訳中…');
  flushTrans().then(function(){
    var now   = new Date();
    var stamp = now.toISOString().slice(0,16).replace('T','_').replace(':','-');
    var ctx   = getCtx();
    var transcript = [
      '# Live Interpreter — English Transcript',
      'Date   : '+now.toLocaleString('ja-JP'),
      'Words  : '+wc,
      ctx?'Context: '+ctx:null,'','---','',fullText.trim()
    ].filter(function(l){return l!==null;}).join('\n');
    saveBlob(transcript, 'transcript_'+stamp+'.txt');
    setSaveStatus('🤖 レポートをClaudeで生成中…');

    return claudeFetch({
      model:'claude-haiku-4-5-20251001', max_tokens:3000,
      system:'会議・講演の議事録作成専門家。英語スピーチ全文を分析し構造化された日本語レポートをMarkdown形式で作成。\n\n# 📋 スピーチ要約レポート\n## 基本情報\n## エグゼクティブサマリー\n## 主要な内容・論点\n## 話の構成・流れ\n## キーワード・専門用語\n## アクションアイテム（なければ省略）\n\n前置き不要。完全な日本語で。',
      messages:[{role:'user',content:['日時: '+now.toLocaleString('ja-JP'),'語数: '+wc+'語',
        ctx?'背景: '+ctx:null,'','【英語スピーチ全文】',fullText.trim()].filter(Boolean).join('\n')}]
    }, 90000);
  })
  .then(function(d){
    var now   = new Date();
    var stamp = now.toISOString().slice(0,16).replace('T','_').replace(':','-');
    var r = d&&d.content&&d.content[0]?d.content[0].text.trim():'';
    saveBlob(r, 'report_'+stamp+'.md');
    setSaveStatus('✅ 保存完了！', true, 7000);
  })
  .catch(function(e){
    showErr('⚠️ レポート生成エラー: '+e.message);
    setSaveStatus('⚠️ レポート失敗（文字起こしは保存済み）', true, 8000);
  });
}
function saveBlob(content, filename) {
  var blob = new Blob([content], {type:'text/plain;charset=utf-8'});
  if (navigator.share && navigator.canShare &&
      navigator.canShare({files:[new File([blob],filename,{type:'text/plain'})]})) {
    navigator.share({files:[new File([blob],filename,{type:'text/plain'})],title:filename})
      .catch(function(e){ if(e.name!=='AbortError') downloadBlob(blob,filename,content); });
    return;
  }
  downloadBlob(blob, filename, content);
}
function downloadBlob(blob, filename, content) {
  try {
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},2000);
  } catch(e){ showModal(content,filename); }
}
function showModal(content,filename){
  modalContent=content;modalName=filename;
  document.getElementById('save-modal-text').value=content;
  document.getElementById('save-modal-title').textContent='📄 '+filename;
  document.getElementById('save-modal').classList.add('open');
}
function closeModal(){ document.getElementById('save-modal').classList.remove('open'); }
function shareModal(){
  if(navigator.share){
    navigator.share({title:modalName,text:modalContent}).then(function(){closeModal();}).catch(function(){copyModal();});
  } else { copyModal(); }
}
function copyModal(){
  navigator.clipboard.writeText(modalContent)
    .then(function(){showErr('📋 クリップボードにコピーしました');closeModal();})
    .catch(function(){showErr('⚠️ 手動でテキストを選択してコピーしてください。');});
}

// ─────────────────────────────────────────────
// クリア
// ─────────────────────────────────────────────
function clearAll() {
  if (isOn) stopListening();
  fullText='';readPos=0;jpCount=0;startTime=null;recentJp=[];
  speechStartAt=0;lastSpeechAt=0;lagHistory=[];segments=[];
  summaryPos=0;summaryCount=0;summaryBusy=false;
  clearInterval(elapsedLoop);stopSummaryTimer();

  document.getElementById('transcript-committed').textContent='（英語音声をここに表示）';
  document.getElementById('transcript-committed').style.color='#555';
  document.getElementById('transcript-interim').textContent='';
  document.getElementById('s-words').textContent='0';
  document.getElementById('s-trans').textContent='0';
  document.getElementById('s-lag').textContent='--';
  document.getElementById('s-el').textContent='00:00';
  document.getElementById('split-bottom').innerHTML=
    '<div id="jp-ph" style="color:var(--muted);font-size:12px;text-align:center;padding:32px 0;line-height:1.8">'
    +'翻訳結果がここに表示されます<br>'
    +'<span style="font-size:10px;opacity:.5">録音開始後、数秒で最初の翻訳が届きます</span></div>';
  document.getElementById('tab-summary').innerHTML=
    '<div id="sum-hdr" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span id="sum-cd" style="font-size:11px;color:var(--muted)"></span>'
    +'<button class="btn d" style="padding:5px 12px;font-size:11px;border-radius:10px" onclick="generateSummary(true)">📝 今すぐ</button>'
    +'</div>'
    +'<div id="sum-ph" style="color:var(--muted);font-size:12px;text-align:center;padding:40px 0;line-height:1.8">'
    +'録音開始後、<b style="color:var(--accent)">1分30秒ごと</b>に<br>英語全文を解析して全体像をまとめます</div>';
  document.getElementById('save-status').style.display='none';
  updateBtns(false);
  setBadge('b-mic','🎙 OFF','boff');
  setBadge('b-ai','🤖 待機','boff');
}
