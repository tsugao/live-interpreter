<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🎙️ Live Interpreter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f1117; --panel: #1a1d2e; --panel2: #141624; --border: #2a2d45;
      --accent: #4dabf7; --green: #40c057; --red: #fa5252;
      --yellow: #ffd43b; --purple: #cc5de8; --muted: #7a7a9a; --text: #e0e0e0;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: var(--text); display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 10px 14px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0; gap: 8px;
    }
    header h1 { font-size: 15px; color: var(--accent); letter-spacing: .5px; white-space: nowrap; }
    #setup-toggle {
      font-size: 12px; color: var(--muted); background: #2a2d45;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 4px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }

    /* ── Setup Panel ── */
    #setup-panel {
      background: var(--panel2); border-bottom: 2px solid var(--accent);
      padding: 12px 14px; flex-shrink: 0;
    }
    .setup-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .setup-row:last-child { margin-bottom: 0; }
    .setup-label { font-size: 11px; color: var(--muted); white-space: nowrap; padding-top: 7px; width: 80px; flex-shrink: 0; }
    .setup-input {
      flex: 1; background: var(--panel); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 6px;
      font-size: 13px; font-family: monospace; min-width: 0;
    }
    .setup-input:focus { outline: none; border-color: var(--accent); }
    textarea.setup-input { font-family: inherit; resize: none; font-size: 12px; height: 50px; }
    .info-note {
      margin-top: 8px; padding: 7px 10px; background: #1a2a1a;
      border-radius: 6px; font-size: 11px; color: #69db7c; line-height: 1.6;
      border-left: 3px solid #40c057;
    }

    /* ── Status Bar ── */
    #statusbar {
      background: var(--panel2); border-bottom: 1px solid var(--border);
      padding: 5px 14px; display: flex; gap: 8px; align-items: center;
      flex-shrink: 0; flex-wrap: wrap;
    }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; border: 1px solid; }
    .boff  { background: #2a1a1a; color: #ff6b6b; border-color: #ff6b6b; }
    .bon   { background: #1a3a1a; color: #69db7c; border-color: #69db7c; }
    .bwait { background: #2a2a1a; color: #ffd43b; border-color: #ffd43b; }
    .stat  { font-size: 11px; color: var(--muted); }
    .stat b { color: var(--accent); }

    /* ── Error Bar ── */
    #err {
      display: none; background: #3a1a1a; color: var(--red);
      padding: 6px 14px; font-size: 12px; flex-shrink: 0;
    }
    #err.show { display: block; }

    /* ── Recording Status ── */
    #rec-box {
      background: var(--panel2); border-bottom: 1px solid var(--border);
      padding: 7px 14px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #rec-status { font-size: 13px; color: var(--muted); flex: 1; }
    /* 音声レベルメーター */
    #mic-meter { display: flex; gap: 2px; align-items: flex-end; height: 18px; flex-shrink: 0; }
    .meter-bar {
      width: 4px; background: var(--border); border-radius: 2px;
      transition: height .1s ease, background .1s ease;
    }

    /* ── Tabs ── */
    #tabs {
      background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 9px 4px; border: none; background: none;
      color: var(--muted); font-size: 12px; font-weight: bold; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all .15s;
      -webkit-touch-callout: none; -webkit-user-select: none;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Main content ── */
    #main { flex: 1; min-height: 0; overflow: hidden; position: relative; }
    .tab-pane {
      position: absolute; inset: 0; overflow-y: scroll;
      padding: 10px 12px 16px; display: none;
      -webkit-overflow-scrolling: touch;
    }
    .tab-pane.active { display: block; }

    /* ── Translation Cards ── */
    .jp-card {
      background: var(--panel2); border: 1px solid #4dabf722;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
      animation: fi .3s ease;
    }
    .jp-card.latest { border-color: var(--purple); box-shadow: 0 0 8px #cc5de822; }
    @keyframes fi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .jp-meta { font-size: 10px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .jp-text { font-size: 16px; line-height: 1.85; color: #e8f4ff; }
    .jp-src  { margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); line-height: 1.5; }
    #jp-ph { color: var(--muted); font-size: 12px; text-align: center; padding: 48px 0; line-height: 1.8; }

    /* ── Summary Cards ── */
    .smr-card { background: var(--panel2); border: 1px solid #40c05733; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; animation: fi .3s ease; }
    .smr-card.loading { opacity: .65; }
    .smr-card.error   { border-color: #fa525244; }
    .smr-meta { font-size: 10px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .smr-meta-label { background: #40c05722; color: #40c057; border: 1px solid #40c05744; border-radius: 10px; padding: 1px 8px; font-size: 10px; }
    .smr-overview { font-size: 13px; line-height: 1.75; color: #d4f5e0; background: #1a2e1a; border-left: 3px solid #40c057; padding: 8px 10px; border-radius: 4px; margin-bottom: 10px; }
    .smr-section-title { font-size: 10px; font-weight: bold; color: #40c057; letter-spacing: .8px; text-transform: uppercase; margin: 10px 0 4px; padding-bottom: 3px; border-bottom: 1px solid #40c05733; }
    .smr-points { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
    .smr-point { font-size: 13px; line-height: 1.75; color: #d4f5e0; padding-left: 16px; position: relative; }
    .smr-point::before { content: '•'; position: absolute; left: 0; color: #40c057; }
    .smr-keywords { font-size: 12px; color: var(--muted); line-height: 1.6; background: #0f1117; border-radius: 4px; padding: 5px 8px; margin-top: 4px; }
    #summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    #summary-countdown { font-size: 11px; color: var(--muted); }
    #summary-ph { color: var(--muted); font-size: 12px; text-align: center; padding: 48px 0; line-height: 1.8; }

    /* ── Transcript ── */
    #transcript-committed { font-size: 14px; line-height: 1.9; color: #ccc; white-space: pre-wrap; word-break: break-word; }
    #transcript-interim   { font-size: 14px; line-height: 1.9; color: var(--yellow); white-space: pre-wrap; word-break: break-word; opacity: .75; }

    /* ── Control Bar ── */
    #ctrl-bar {
      background: var(--panel); border-top: 1px solid var(--border);
      padding: 10px 12px; display: flex; gap: 6px; flex-shrink: 0;
      justify-content: center; flex-wrap: wrap;
    }
    .btn {
      padding: 11px 18px; border: none; border-radius: 22px; cursor: pointer;
      font-size: 13px; font-weight: bold; transition: opacity .15s;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
      white-space: nowrap;
    }
    .btn:active { opacity: .65; }
    .btn:disabled { opacity: .35; pointer-events: none; }
    .g { background: var(--green); color: #fff; }
    .r { background: var(--red); color: #fff; }
    .d { background: #3a3d55; color: #ccc; }
    .p { background: var(--purple); color: #fff; font-size: 12px; padding: 11px 14px; }

    /* ── Save Status ── */
    #save-status { display: none; background: #1a2a3a; color: var(--accent); padding: 8px 14px; font-size: 12px; text-align: center; flex-shrink: 0; border-top: 1px solid #4dabf744; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>🎙️ Live Interpreter
    <span style="font-size:10px;color:var(--muted);font-weight:normal"> Claude</span>
  </h1>
  <button id="setup-toggle" onclick="toggleSetup()">⚙️ 設定</button>
</header>

<!-- ── Setup Panel ── -->
<div id="setup-panel">
  <div class="setup-row">
    <span class="setup-label">🤖 Claude Key</span>
    <input type="password" id="claude-key" class="setup-input"
      placeholder="sk-ant-api03-..." oninput="saveKeys()">
  </div>
  <div class="setup-row">
    <span class="setup-label">📋 背景情報</span>
    <textarea id="session-context" class="setup-input"
      placeholder="例: AI国際カンファレンス。トークン化・DeFiの議論。" oninput="saveContext()"></textarea>
  </div>
  <div class="info-note">
    ✅ OpenAI不要 — ブラウザ内蔵の音声認識 + Claude APIだけで動作します<br>
    ⚠️ 音声認識はApple/Googleのサーバーを経由します（HTTPS必須）
  </div>
</div>

<!-- ── Status Bar ── -->
<div id="statusbar">
  <div class="badge boff" id="b-mic">🎙 OFF</div>
  <div class="badge boff" id="b-ai">🤖 待機</div>
  <div class="stat">語数: <b id="s-words">0</b></div>
  <div class="stat">翻訳: <b id="s-trans">0</b>回</div>
  <div class="stat">経過: <b id="s-el">00:00</b></div>
</div>

<!-- ── Error ── -->
<div id="err"></div>

<!-- ── Recording Status ── -->
<div id="rec-box">
  <div id="rec-status" style="color:var(--muted);font-size:12px">「▶ 開始」を押してください</div>
  <div id="mic-meter">
    <div class="meter-bar" id="mb1" style="height:4px"></div>
    <div class="meter-bar" id="mb2" style="height:6px"></div>
    <div class="meter-bar" id="mb3" style="height:4px"></div>
    <div class="meter-bar" id="mb4" style="height:6px"></div>
    <div class="meter-bar" id="mb5" style="height:4px"></div>
  </div>
</div>

<!-- ── Tabs ── -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('jp')">🇯🇵 翻訳</button>
  <button class="tab-btn" onclick="switchTab('summary')">🧠 まとめ</button>
  <button class="tab-btn" onclick="switchTab('transcript')">📝 原文</button>
</div>

<!-- ── Main Panes ── -->
<div id="main">

  <!-- 翻訳ペイン -->
  <div id="tab-jp" class="tab-pane active">
    <div id="jp-ph">
      翻訳結果がここに表示されます<br>
      <span style="font-size:10px;opacity:.6">英語が一定量蓄積されると自動的に翻訳されます</span>
    </div>
  </div>

  <!-- まとめペイン -->
  <div id="tab-summary" class="tab-pane">
    <div id="summary-header">
      <span id="summary-countdown"></span>
      <button class="btn d" style="padding:5px 12px;font-size:11px;border-radius:10px"
        onclick="generateSummary(true)">📝 今すぐ</button>
    </div>
    <div id="summary-ph">
      録音開始後、<b style="color:var(--accent)">1分30秒ごと</b>に<br>
      英語全文を解析して全体像をまとめます
    </div>
  </div>

  <!-- 原文ペイン -->
  <div id="tab-transcript" class="tab-pane">
    <div id="transcript-committed" style="color:#555">（文字起こしがここに表示されます）</div>
    <div id="transcript-interim"></div>
  </div>

</div>

<!-- ── Save Status ── -->
<div id="save-status"></div>

<!-- ── Control Bar ── -->
<div id="ctrl-bar">
  <button class="btn g" id="start-btn" onclick="startListening()">▶ 開始</button>
  <button class="btn r" id="stop-btn"  onclick="stopListening()" disabled>⏹ 停止</button>
  <button class="btn d" id="save-btn"  onclick="saveSession()">💾 保存</button>
  <button class="btn p"               onclick="clearAll()">🗑</button>
</div>

<script>
'use strict';
// ============================================================
// 状態変数
// ============================================================
let isOn             = false;
let fullText         = '';        // 確定済み英語テキスト
let startTime        = null;
let elapsedLoop      = null;
let jpCount          = 0;

// 翻訳制御
let readPos          = 0;
let lastTranslated   = 0;
let translating      = false;
let recentJpTrans    = [];

// 要約制御
let summaryPos       = 0;
let summaryCount     = 0;
let summaryBusy      = false;
let summaryTimerId   = null;
let summaryCountdownId = null;
let summaryNextAt    = 0;

// SpeechRecognition
let recognition      = null;
let meterAnim        = null;

// 定数
const TRANSLATE_INTERVAL  = 8000;   // 文末がなくても8秒で強制翻訳
const MIN_WAIT            = 1500;   // 翻訳間の最短間隔
const MIN_WORDS           = 8;      // 翻訳開始語数
const MIN_WORDS_COLDSTART = 12;     // 初回翻訳の語数閾値
const CONTEXT_WORDS       = 500;    // Claudeに渡す英語コンテキスト語数
const SUMMARY_INTERVAL    = 90000; // 要約間隔 (90秒)
const SUMMARY_MIN_WORDS   = 30;    // 要約最低語数

// ============================================================
// ページ初期化
// ============================================================
(function init() {
  const ck  = localStorage.getItem('claude_key')      || '';
  const ctx = localStorage.getItem('session_context') || '';
  if (ck)  document.getElementById('claude-key').value      = ck;
  if (ctx) document.getElementById('session-context').value = ctx;
  if (ck)  document.getElementById('setup-panel').style.display = 'none';
})();

// ============================================================
// 設定 / UI ユーティリティ
// ============================================================
function toggleSetup() {
  const p = document.getElementById('setup-panel');
  p.style.display = (p.style.display === 'none') ? 'block' : 'none';
}
function saveKeys() {
  const ck = document.getElementById('claude-key').value.trim();
  if (ck) localStorage.setItem('claude_key', ck);
}
function saveContext() {
  localStorage.setItem('session_context', document.getElementById('session-context').value);
}
function getClaudeKey() {
  return document.getElementById('claude-key').value.trim()
      || localStorage.getItem('claude_key') || '';
}
function getContext() {
  return document.getElementById('session-context').value.trim() || '';
}
function switchTab(name) {
  const names = ['jp', 'summary', 'transcript'];
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('active', p.id === 'tab-' + name));
}
function setBadge(id, text, cls) {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = 'badge ' + cls; }
}
function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 8000);
}
function showSaveStatus(msg, autoHide = false, ms = 0) {
  const el = document.getElementById('save-status');
  el.textContent = msg; el.style.display = 'block';
  if (autoHide) setTimeout(() => { el.style.display = 'none'; }, ms || 5000);
}
function updateElapsed() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('s-el').textContent =
    String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}
function _updateBtns(recording) {
  document.getElementById('start-btn').disabled = recording;
  document.getElementById('stop-btn').disabled  = !recording;
  document.getElementById('start-btn').textContent = recording ? '🔴 録音中' : '▶ 開始';
}
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// マイクメーターアニメーション（録音中の視覚フィードバック）
// ============================================================
function startMeter() {
  const bars = [1,2,3,4,5].map(i => document.getElementById('mb'+i));
  meterAnim = setInterval(() => {
    bars.forEach(b => {
      const h = isOn ? (4 + Math.random() * 12) : 4;
      b.style.height = h + 'px';
      b.style.background = isOn ? 'var(--green)' : 'var(--border)';
    });
  }, 120);
}
function stopMeter() {
  clearInterval(meterAnim);
  [1,2,3,4,5].forEach(i => {
    const b = document.getElementById('mb'+i);
    if (b) { b.style.height = '4px'; b.style.background = 'var(--border)'; }
  });
}

// ============================================================
// Web Speech API 音声認識
// ============================================================
function startListening() {
  if (isOn) return;
  if (!getClaudeKey()) {
    showErr('⚠️ Claude API Keyを設定してください');
    toggleSetup(); return;
  }

  // Web Speech API サポートチェック
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showErr('⚠️ このブラウザは音声認識に対応していません（Safari / Chrome を使用してください）');
    return;
  }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;       // 連続認識
  recognition.interimResults = true;   // 途中結果も取得
  recognition.maxAlternatives = 1;

  // ── 認識結果ハンドラ ──
  recognition.onresult = (event) => {
    let interimText = '';
    let finalText   = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += t;
      } else {
        interimText += t;
      }
    }

    // 確定テキストを蓄積
    if (finalText.trim()) {
      fullText += finalText.trim() + ' ';
      document.getElementById('s-words').textContent =
        fullText.trim().split(/\s+/).filter(Boolean).length;
      maybeTranslate();
    }

    // 原文ペインをリアルタイム更新（確定テキスト + 途中テキスト）
    updateTranscriptView(interimText);
  };

  // ── 認識終了 → 自動再起動（iOS対策）──
  recognition.onend = () => {
    if (isOn) {
      // 少し待ってから再起動（即時再起動すると iOS でエラーになることがある）
      setTimeout(() => {
        if (isOn && recognition) {
          try { recognition.start(); } catch(e) { /* ignore */ }
        }
      }, 300);
    }
  };

  // ── エラーハンドラ ──
  recognition.onerror = (event) => {
    if (event.error === 'no-speech') return;   // 無音は正常
    if (event.error === 'aborted')  return;   // 手動停止
    if (event.error === 'network') {
      showErr('⚠️ ネットワークエラー（音声認識にはインターネット接続が必要です）');
      return;
    }
    console.warn('[STT] error:', event.error);
  };

  // ── 開始 ──
  isOn = true;
  lastTranslated = Date.now();

  try {
    recognition.start();
  } catch(e) {
    isOn = false;
    showErr('⚠️ 音声認識の開始に失敗しました: ' + e.message);
    return;
  }

  if (!startTime) {
    startTime   = Date.now();
    elapsedLoop = setInterval(updateElapsed, 1000);
  }

  setBadge('b-mic', '🔴 認識中', 'bon');
  _updateBtns(true);
  document.getElementById('rec-status').textContent = '🎤 英語を話してください…';
  document.getElementById('rec-status').style.color = 'var(--yellow)';
  document.getElementById('setup-panel').style.display = 'none';

  startMeter();
  startSummaryTimer();
}

function stopListening() {
  isOn = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) { /* ignore */ }
    recognition = null;
  }
  clearInterval(elapsedLoop);
  stopMeter();

  setBadge('b-mic', '⏹ 停止', 'boff');
  document.getElementById('rec-status').textContent = '停止済み（「💾 保存」でファイルを保存）';
  document.getElementById('rec-status').style.color = 'var(--muted)';
  document.getElementById('transcript-interim').textContent = '';
  _updateBtns(false);
  stopSummaryTimer();
}

// 原文ペイン更新（確定テキスト白 + 途中テキスト黄）
function updateTranscriptView(interimText) {
  const committed = document.getElementById('transcript-committed');
  const interim   = document.getElementById('transcript-interim');
  if (fullText.trim()) {
    committed.textContent = fullText;
    committed.style.color = '#ccc';
  }
  interim.textContent = interimText || '';
}

// ============================================================
// 翻訳タイミング制御
// ============================================================
function hasCompleteSentence(text) {
  return /[.!?](\s|$)/.test(text.trim());
}
function ensureJpComplete(text) {
  if (!text) return text;
  const t = text.trim();
  if (/[。！？]$/.test(t)) return t;
  const last = Math.max(t.lastIndexOf('。'), t.lastIndexOf('！'), t.lastIndexOf('？'));
  if (last > 0 && last >= t.length * 0.35) return t.slice(0, last + 1);
  return t + '。';
}

function maybeTranslate() {
  if (translating) return;
  const chunk = fullText.slice(readPos).trim();
  const words = chunk.split(/\s+/).filter(Boolean).length;
  const wait  = Date.now() - lastTranslated;
  if (wait < MIN_WAIT) return;

  const isColdStart = (recentJpTrans.length === 0);
  const threshold   = isColdStart ? MIN_WORDS_COLDSTART : MIN_WORDS;
  if (words < threshold) return;
  if (!hasCompleteSentence(chunk) && wait < TRANSLATE_INTERVAL) return;

  doTranslate();
}

// 定期チェック（SpeechRecognition の pause 後でも翻訳を試みる）
setInterval(() => { if (isOn && !translating) maybeTranslate(); }, 3000);

// ============================================================
// Claude API 翻訳（ブラウザから直接呼び出し）
// ============================================================
async function doTranslate() {
  if (translating) return;
  const chunk = fullText.slice(readPos).trim();
  if (!chunk || chunk.split(/\s+/).filter(Boolean).length < 5) return;

  const key = getClaudeKey();
  if (!key) return;

  translating    = true;
  const snapshot = fullText.length;
  lastTranslated = Date.now();
  setBadge('b-ai', '🤖 翻訳中…', 'bwait');

  const jpCtx  = recentJpTrans.slice(-8).join('\n');
  const prevEn = fullText.slice(0, readPos).trim()
                         .split(/\s+/).filter(Boolean)
                         .slice(-CONTEXT_WORDS).join(' ');
  const ctx = getContext();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key':    key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model:      'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content:
`あなたはプロの英語→日本語同時通訳者です。
英語スピーチをリアルタイム音声認識しています。認識ノイズが含まれますが、文脈から自然な日本語に意訳してください。
${ctx    ? `\n【背景情報】\n${ctx}\n`               : ''}
${jpCtx  ? `\n【直近の翻訳（文脈用）】\n${jpCtx}\n` : ''}
${prevEn ? `\n【英語文脈（翻訳対象外）】\n${prevEn}\n` : ''}
━━━━━━━━━━
【今回翻訳する英語】
${chunk}
━━━━━━━━━━
【出力ルール】
・日本語訳文のみ（前置き・コメント不要）
・2〜4文でまとめる
・必ず「。」「！」「？」のいずれかで終わる完全な文章
・言い淀み（"I mean" "you know" "so" 等）は省略
・意味不明な部分は省略してよい
・原文にない固有名詞・数値は追加しないこと`
        }],
      }),
      signal: AbortSignal.timeout(20000),
    });

    if (!res.ok) throw new Error(`Claude API ${res.status}`);
    const data  = await res.json();
    const rawJp = data?.content?.[0]?.text?.trim() || '';
    if (!rawJp) throw new Error('翻訳結果が空です');

    const jpText = ensureJpComplete(rawJp);
    readPos = snapshot;
    setBadge('b-ai', '🤖 完了', 'bon');

    recentJpTrans.push(jpText);
    if (recentJpTrans.length > 12) recentJpTrans.shift();

    jpCount++;
    document.getElementById('s-trans').textContent = jpCount;
    addJpCard(jpText, chunk);

  } catch(e) {
    if (e.name !== 'AbortError') {
      showErr('⚠️ 翻訳エラー: ' + e.message);
      setBadge('b-ai', '⚠️ エラー', 'boff');
    }
  } finally {
    translating = false;
  }
}

function addJpCard(jpText, srcText) {
  const pane = document.getElementById('tab-jp');
  const ph   = document.getElementById('jp-ph');
  if (ph) ph.remove();

  document.querySelectorAll('.jp-card.latest').forEach(c => c.classList.remove('latest'));

  const card = document.createElement('div');
  card.className = 'jp-card latest';
  const t = new Date().toLocaleTimeString('ja-JP');
  card.innerHTML = `
    <div class="jp-meta">
      <span>🕐 ${t}</span>
      <span style="color:var(--accent)">第 ${jpCount} 回</span>
    </div>
    <div class="jp-text">${esc(jpText).replace(/\n/g, '<br>')}</div>
    ${srcText
      ? `<div class="jp-src">${esc(srcText.slice(0, 120))}${srcText.length > 120 ? '…' : ''}</div>`
      : ''}

  requestAnimationFrame(() => { pane.scrollTop = pane.scrollHeight; });

// ============================================================
// 要約タイマー（90秒間隔）
// ============================================================
function _updateCountdown() {
  const el = document.getElementById('summary-countdown');
  if (!el) return;
  if (!isOn || !summaryNextAt) { el.textContent = ''; return; }
  const rem = Math.max(0, Math.ceil((summaryNextAt - Date.now()) / 1000));
  const m   = Math.floor(rem / 60);
  const s   = rem % 60;
  el.textContent = `次の要約まで ${m}:${String(s).padStart(2, '0')}`;
}

function startSummaryTimer() {
  stopSummaryTimer();
  summaryNextAt  = Date.now() + SUMMARY_INTERVAL;
  summaryTimerId = setTimeout(async function tick() {
    await generateSummary(false);
    if (isOn) {
      summaryNextAt  = Date.now() + SUMMARY_INTERVAL;
      summaryTimerId = setTimeout(tick, SUMMARY_INTERVAL);
    }
  }, SUMMARY_INTERVAL);
  summaryCountdownId = setInterval(_updateCountdown, 1000);
  _updateCountdown();
}

function stopSummaryTimer() {
  clearTimeout(summaryTimerId);
  clearInterval(summaryCountdownId);
  summaryTimerId = summaryCountdownId = null;
  summaryNextAt  = 0;
  _updateCountdown();
}

// ============================================================
// 要約生成（Claude に全文を送信）

  const header = document.getElementById('summary-header');

  else pane.appendChild(card);

  try {
    const ctx = getContext();
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key':    key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model:      'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        system:
`あなたは同時通訳の補助AIです。英語スピーチ全文を精読し、全体像・論点・構造を日本語で整理してください。

【出力フォーマット（必ずこの順序で）】

▌ 概要

【ルール】前置き・注釈不要。上記フォーマットのみ出力。`,
        messages: [{
          role: 'user',

            ctx ? `【背景情報】\n${ctx}\n\n` : '',

    const data = await res.json();

// 要約テキストを構造化HTMLに変換
function parseSummary(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  let html = ''; let bullets = []; let secTitle = ''; let inOverview = false;

  function flush() {
    if (!bullets.length) return;
    if (secTitle) html += `<div class="smr-section-title">${esc(secTitle)}</div>`;
    html += `<ul class="smr-points">${bullets.map(b => `<li class="smr-point">${esc(b)}</li>`).join('')}</ul>`;
    bullets = []; secTitle = '';
  }

  for (const l of lines) {
    if (/^▌/.test(l)) {
      inOverview = true;
      const rest = l.replace(/^▌\s*(概要|全体像)?\s*/i, '').trim();
      if (rest) html += `<div class="smr-overview">${esc(rest)}`;
      continue;
    }
    if (/^##/.test(l)) {
      if (inOverview) { html += '</div>'; inOverview = false; }
      flush(); secTitle = l.replace(/^#+\s*/, '').trim(); continue;
    }
    if (/^[•・\-]/.test(l) || /^\d+[\.\)]/.test(l)) {
      if (inOverview) { html += '</div>'; inOverview = false; }
      bullets.push(l.replace(/^[\s•・\-\d\.\)]+/, '').trim()); continue;
    }
    if (/^(キーワード|Keywords)/i.test(l)) {
      if (inOverview) { html += '</div>'; inOverview = false; }
      flush();
      const kws = l.replace(/^[^:：]*[：:]\s*/, '').trim();
      html += `<div class="smr-section-title">キーワード</div><div class="smr-keywords">${esc(kws)}</div>`;
      continue;
    }
    if (inOverview) { html += '<br>' + esc(l); continue; }
    html += `<p style="font-size:12px;color:var(--muted);margin:4px 0;line-height:1.6">${esc(l)}</p>`;
  }
  if (inOverview) html += '</div>';
  flush();
  return html;
}

// ============================================================
// 未翻訳テキストのフラッシュ（保存前処理）
// ============================================================
async function flushTranslations() {
  for (let i = 0; i < 60 && translating; i++) await new Promise(r => setTimeout(r, 300));
  for (let loop = 0; loop < 8; loop++) {
    while (translating) await new Promise(r => setTimeout(r, 300));
    const remaining = fullText.slice(readPos).trim();
    if (remaining.split(/\s+/).filter(Boolean).length < 3) break;
    lastTranslated = 0;
    await doTranslate();
  }
}

// ============================================================
// セッション保存（2ファイルダウンロード）
// ============================================================
async function saveSession() {
  if (isOn) stopListening();

  const wordCount = fullText.trim().split(/\s+/).filter(Boolean).length;
  if (wordCount < 10) {
    showErr('⚠️ 保存するテキストがありません（録音が短すぎます）');
    return;
  }
  const key = getClaudeKey();
  if (!key) { showErr('⚠️ Claude API Keyを設定してください'); return; }

  showSaveStatus('🔄 残りのテキストを翻訳中…');
  await flushTranslations();

  const now   = new Date();
  const stamp = now.toISOString().slice(0, 16).replace('T', '_').replace(':', '-');
  const ctx   = getContext();

  // ─── ファイル① 英文文字起こし ───

    `Date   : ${now.toLocaleString('ja-JP')}`,
    `Words  : ${wordCount}`,
    ctx ? `Context: ${ctx}` : null,
    '', '---', '',
    fullText.trim(),
  ].filter(l => l !== null).join('\n');

  downloadText(transcriptTxt, `transcript_${stamp}.txt`);

  // ─── ファイル② Claude 構造化レポート ───
  showSaveStatus('🤖 Claude でレポートを生成中…');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key':    key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 4096,
        system:
`あなたは会議・講演の議事録作成の専門家です。英語スピーチ全文を分析し、構造化された日本語レポートをMarkdown形式で作成してください。

【出力フォーマット】

# 📋 スピーチ要約レポート

## 基本情報
- 日時:
- 語数:
- 背景: （あれば）

## エグゼクティブサマリー

        messages: [{
          role: 'user',
          content: [
            `日時: ${now.toLocaleString('ja-JP')}`,
            `語数: ${wordCount} 語`,
            ctx ? `背景情報: ${ctx}` : null,

        }],
      }),
      signal: AbortSignal.timeout(120000),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const reportMd = data?.content?.[0]?.text?.trim() || '';

    downloadText(reportMd, `report_${stamp}.md`);
    showSaveStatus('✅ 保存完了！ 2つのファイルがダウンロードされました', true, 7000);

  } catch(e) {
    showSaveStatus(`⚠️ レポート生成エラー: ${e.message}`, true, 10000);
    console.error('[save]', e);
  }

function downloadText(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}
