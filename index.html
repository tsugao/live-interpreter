<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🎙️ Live Interpreter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#0f1117; --panel:#1a1d2e; --panel2:#141624; --border:#2a2d45;
      --accent:#4dabf7; --green:#40c057; --red:#fa5252;
      --yellow:#ffd43b; --purple:#cc5de8; --muted:#7a7a9a; --text:#e0e0e0;
    }
    html, body { height:100%; overflow:hidden; background:var(--bg); }
    body { font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
           color:var(--text); display:flex; flex-direction:column; }

    /* ── Header ── */
    header { background:var(--panel); border-bottom:1px solid var(--border);
             padding:9px 13px; display:flex; align-items:center;
             justify-content:space-between; flex-shrink:0; gap:8px; }
    header h1 { font-size:15px; color:var(--accent); white-space:nowrap; }
    #setup-toggle { font-size:11px; color:var(--muted); background:#2a2d45;
                    border:1px solid var(--border); border-radius:12px;
                    padding:4px 10px; cursor:pointer; flex-shrink:0; }

    /* ── Setup Panel ── */
    #setup-panel { background:var(--panel2); border-bottom:2px solid var(--accent);
                   padding:11px 13px; flex-shrink:0; }
    .setup-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:7px; }
    .setup-row:last-of-type { margin-bottom:0; }
    .setup-label { font-size:11px; color:var(--muted); padding-top:7px;
                   width:78px; flex-shrink:0; white-space:nowrap; }
    .setup-input { flex:1; background:var(--panel); border:1px solid var(--border);
                   color:var(--text); padding:6px 9px; border-radius:6px;
                   font-size:13px; font-family:monospace; min-width:0; }
    .setup-input:focus { outline:none; border-color:var(--accent); }
    textarea.setup-input { font-family:inherit; resize:none; font-size:12px; height:46px; }
    .info-note { margin-top:8px; padding:6px 10px; background:#1a2a1a;
                 border-radius:6px; font-size:11px; color:#69db7c; line-height:1.55;
                 border-left:3px solid #40c057; }

    /* ── Status Bar ── */
    #statusbar { background:var(--panel2); border-bottom:1px solid var(--border);
                 padding:4px 13px; display:flex; gap:7px; align-items:center;
                 flex-shrink:0; flex-wrap:wrap; }
    .badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; border:1px solid; }
    .boff  { background:#2a1a1a; color:#ff6b6b; border-color:#ff6b6b; }
    .bon   { background:#1a3a1a; color:#69db7c; border-color:#69db7c; }
    .bwait { background:#2a2a1a; color:#ffd43b; border-color:#ffd43b; }
    .stat  { font-size:11px; color:var(--muted); }
    .stat b { color:var(--accent); }

    /* ── Error Bar ── */
    #err { display:none; background:#3a1a1a; color:var(--red);
           padding:5px 13px; font-size:12px; flex-shrink:0; }
    #err.show { display:block; }

    /* ── Tabs ── */
    #tabs { background:var(--panel); border-bottom:1px solid var(--border);
            display:flex; flex-shrink:0; }
    .tab-btn { flex:1; padding:9px 4px; border:none; background:none;
               color:var(--muted); font-size:13px; font-weight:bold; cursor:pointer;
               border-bottom:2px solid transparent; transition:all .15s;
               -webkit-touch-callout:none; -webkit-user-select:none; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* ── Main area ── */
    #main { flex:1; min-height:0; overflow:hidden; position:relative; }
    .tab-pane { position:absolute; inset:0; display:none; flex-direction:column; }
    .tab-pane.active { display:flex; }

    /* ── Split layout (メイン tab) ── */
    #split-top { flex:0 0 34%; min-height:0; overflow-y:scroll; padding:8px 12px 6px;
                 -webkit-overflow-scrolling:touch; background:var(--bg); }
    #split-divider { flex-shrink:0; height:28px; background:var(--panel2);
                     border-top:1px solid var(--border); border-bottom:1px solid var(--border);
                     display:flex; align-items:center; justify-content:space-between;
                     padding:0 12px; }
    #split-divider-label { font-size:10px; color:var(--muted);
                           text-transform:uppercase; letter-spacing:.8px; }
    #rec-inline { font-size:11px; color:var(--yellow); }
    #split-bottom { flex:1; min-height:0; overflow-y:scroll; padding:8px 12px 12px;
                    -webkit-overflow-scrolling:touch; }

    /* Summary tab */
    #tab-summary { overflow-y:scroll; -webkit-overflow-scrolling:touch;
                   padding:10px 12px 14px; }

    /* ── Transcript ── */
    #transcript-committed { font-size:13px; line-height:1.85; color:#bbb;
                             white-space:pre-wrap; word-break:break-word; }
    #transcript-interim   { font-size:13px; line-height:1.85; color:var(--yellow);
                             white-space:pre-wrap; word-break:break-word; opacity:.8; }

    /* ── Translation Cards ── */
    .jp-card { background:var(--panel2); border:1px solid #4dabf722;
               border-radius:10px; padding:11px 13px; margin-bottom:9px;
               animation:fi .25s ease; }
    @keyframes fi { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
    .jp-meta { font-size:10px; color:var(--muted); margin-bottom:5px;
               display:flex; justify-content:space-between; align-items:center; gap:4px; }
    .jp-lag  { background:#1a1a2e; border:1px solid var(--border); border-radius:8px;
               padding:1px 6px; font-size:10px; color:var(--accent); white-space:nowrap; }
    .jp-text { font-size:16px; line-height:1.85; color:#e8f4ff; }
    .jp-src  { margin-top:6px; padding-top:6px; border-top:1px solid var(--border);
               font-size:11px; color:var(--muted); line-height:1.5; }
    #jp-ph   { color:var(--muted); font-size:12px; text-align:center;
               padding:32px 0; line-height:1.8; }

    /* ── Summary Cards ── */
    .smr-card { background:var(--panel2); border:1px solid #40c05733;
                border-radius:10px; padding:12px 13px; margin-bottom:9px; animation:fi .3s ease; }
    .smr-card.loading { opacity:.65; }
    .smr-card.error   { border-color:#fa525244; }
    .smr-meta { font-size:10px; color:var(--muted); margin-bottom:7px;
                display:flex; justify-content:space-between; align-items:center; }
    .smr-meta-label { background:#40c05722; color:#40c057; border:1px solid #40c05744;
                      border-radius:10px; padding:1px 8px; font-size:10px; }
    .smr-overview  { font-size:13px; line-height:1.75; color:#d4f5e0; background:#1a2e1a;
                     border-left:3px solid #40c057; padding:8px 10px; border-radius:4px; margin-bottom:9px; }
    .smr-section-title { font-size:10px; font-weight:bold; color:#40c057; letter-spacing:.8px;
                         text-transform:uppercase; margin:9px 0 4px; padding-bottom:3px;
                         border-bottom:1px solid #40c05733; }
    .smr-points { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px; }
    .smr-point  { font-size:13px; line-height:1.75; color:#d4f5e0; padding-left:15px; position:relative; }
    .smr-point::before { content:'•'; position:absolute; left:0; color:#40c057; }
    .smr-keywords { font-size:12px; color:var(--muted); line-height:1.6;
                    background:#0f1117; border-radius:4px; padding:5px 8px; margin-top:3px; }
    #sum-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    #sum-cd  { font-size:11px; color:var(--muted); }
    #sum-ph  { color:var(--muted); font-size:12px; text-align:center; padding:40px 0; line-height:1.8; }

    /* ── Save Modal (iOS share fallback) ── */
    #save-modal { display:none; position:fixed; inset:0; background:#000a; z-index:100;
                  align-items:flex-end; }
    #save-modal.open { display:flex; }
    #save-modal-inner { background:var(--panel); border-radius:16px 16px 0 0; padding:16px;
                        width:100%; max-height:75vh; display:flex; flex-direction:column; gap:10px; }
    #save-modal-title { font-size:14px; font-weight:bold; color:var(--accent); }
    #save-modal-text  { flex:1; min-height:0; background:var(--bg); border:1px solid var(--border);
                        border-radius:8px; padding:10px; color:#ccc; font-size:12px;
                        font-family:monospace; overflow-y:scroll; resize:none;
                        -webkit-overflow-scrolling:touch; white-space:pre-wrap; }
    #save-modal-btns  { display:flex; gap:8px; }

    /* ── Save Status ── */
    #save-status { display:none; background:#1a2a3a; color:var(--accent);
                   padding:7px 13px; font-size:12px; text-align:center;
                   flex-shrink:0; border-top:1px solid #4dabf744; }

    /* ── Control Bar ── */
    #ctrl-bar { background:var(--panel); border-top:1px solid var(--border);
                padding:9px 12px; display:flex; gap:6px; flex-shrink:0;
                justify-content:center; flex-wrap:wrap; }
    .btn { padding:10px 18px; border:none; border-radius:22px; cursor:pointer;
           font-size:13px; font-weight:bold; transition:opacity .15s;
           -webkit-touch-callout:none; -webkit-user-select:none; white-space:nowrap; }
    .btn:active { opacity:.65; }
    .btn:disabled { opacity:.35; pointer-events:none; }
    .g { background:var(--green); color:#fff; }
    .r { background:var(--red); color:#fff; }
    .d { background:#3a3d55; color:#ccc; }
    .p { background:var(--purple); color:#fff; font-size:12px; padding:10px 14px; }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>🎙️ Live Interpreter
    <span style="font-size:10px;color:var(--muted);font-weight:normal"> Claude</span>
  </h1>
  <button id="setup-toggle" onclick="toggleSetup()">⚙️ 設定</button>
</header>

<!-- ── Setup Panel ── -->
<div id="setup-panel">
  <div class="setup-row">
    <span class="setup-label">🤖 Claude Key</span>
    <input type="password" id="claude-key" class="setup-input"
           placeholder="sk-ant-api03-..." oninput="saveKeys()">
  </div>
  <div class="setup-row">
    <span class="setup-label">📋 背景情報</span>
    <textarea id="session-context" class="setup-input"
              placeholder="例: AI国際カンファレンス。DeFiの議論。" oninput="saveContext()"></textarea>
  </div>
  <div class="info-note">
    ✅ OpenAI不要 — ブラウザ内蔵STT + Claude APIのみで動作<br>
    ⚠️ 音声認識はApple/Googleサーバーを経由 / HTTPS必須
  </div>
</div>

<!-- ── Status Bar ── -->
<div id="statusbar">
  <div class="badge boff" id="b-mic">🎙 OFF</div>
  <div class="badge boff" id="b-ai">🤖 待機</div>
  <div class="stat">語数:<b id="s-words">0</b></div>
  <div class="stat">翻訳:<b id="s-trans">0</b>回</div>
  <div class="stat">平均遅延:<b id="s-lag">--</b>s</div>
  <div class="stat"><b id="s-el">00:00</b></div>
</div>

<!-- ── Error ── -->
<div id="err"></div>

<!-- ── Tabs ── -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('main')">🎙 メイン</button>
  <button class="tab-btn"        onclick="switchTab('summary')">🧠 まとめ</button>
</div>

<!-- ── Main content ── -->
<div id="main">

  <!-- メイン: 上=英語原文 / 下=日本語翻訳 -->
  <div id="tab-main" class="tab-pane active">

    <!-- 英語原文エリア -->
    <div id="split-top">
      <div id="transcript-committed" style="color:#555">（英語音声をここに表示）</div>
      <div id="transcript-interim"></div>
    </div>

    <!-- 仕切り -->
    <div id="split-divider">
      <span id="split-divider-label">🇯🇵 日本語翻訳</span>
      <span id="rec-inline"></span>
    </div>

    <!-- 日本語翻訳エリア -->
    <div id="split-bottom">
      <div id="jp-ph">
        翻訳結果がここに表示されます<br>
        <span style="font-size:10px;opacity:.5">録音開始後、数秒で最初の翻訳が届きます</span>
      </div>
    </div>

  </div>

  <!-- まとめタブ -->
  <div id="tab-summary" class="tab-pane">
    <div id="sum-hdr">
      <span id="sum-cd"></span>
      <button class="btn d" style="padding:5px 12px;font-size:11px;border-radius:10px"
              onclick="generateSummary(true)">📝 今すぐ</button>
    </div>
    <div id="sum-ph">
      録音開始後、<b style="color:var(--accent)">1分30秒ごと</b>に<br>
      英語全文を解析して全体像をまとめます
    </div>
  </div>

</div>

<!-- ── Save Status ── -->
<div id="save-status"></div>

<!-- ── Control Bar ── -->
<div id="ctrl-bar">
  <button class="btn g" id="start-btn" onclick="startListening()">▶ 開始</button>
  <button class="btn r" id="stop-btn"  onclick="stopListening()" disabled>⏹ 停止</button>
  <button class="btn d" id="save-btn"  onclick="saveSession()">💾 保存</button>
  <button class="btn p"               onclick="clearAll()">🗑</button>
</div>

<!-- ── Save Modal (iOS用フォールバック) ── -->
<div id="save-modal">
  <div id="save-modal-inner">
    <div id="save-modal-title">📄 保存内容</div>
    <textarea id="save-modal-text" readonly></textarea>
    <div id="save-modal-btns">
      <button class="btn g" style="flex:1" onclick="shareModalContent()">📤 共有</button>
      <button class="btn d" style="flex:1" onclick="closeSaveModal()">✕ 閉じる</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// 状態変数
// ============================================================
let isOn           = false;
let fullText       = '';      // 確定済み英語テキスト全体
let startTime      = null;
let elapsedLoop    = null;
let jpCount        = 0;

// 翻訳制御
let readPos        = 0;       // 翻訳済み末尾位置
let lastTranslated = 0;       // 最後に翻訳を開始した時刻
let translating    = false;

// タイムラグ計測（正確な音声入力開始〜翻訳表示までの計測）
let batchArrivalTime  = 0;    // 現在の未翻訳バッチの最初のfinalテキスト到着時刻
let lastFinalArrival  = 0;    // 最後にfinalテキストが届いた時刻（次バッチ追跡用）
let lagHistory        = [];   // 直近のタイムラグ記録 (秒)

// 翻訳済みセグメント（英語ハイライト用）
let translatedSegments = [];  // {start, end} — 文字位置
// ハイライト色: 最新=紫、それ以外=薄青
const HL_LATEST_BG     = 'rgba(204,93,232,0.45)';
const HL_LATEST_BORDER = '#cc5de8';
const HL_PREV_BG       = 'rgba(77,171,247,0.18)';
const HL_PREV_BORDER   = '#4dabf755';

// interim テキスト保持（翻訳後に消えないよう）
let currentInterim = '';

// コンテキスト
let recentJpTrans  = [];      // 直近の日本語訳（文脈用）

// 要約制御
let summaryPos     = 0;
let summaryCount   = 0;
let summaryBusy    = false;
let summaryTimerId = null;
let sumCdId        = null;
let summaryNextAt  = 0;

// SpeechRecognition
let recognition    = null;
let meterAnim      = null;

// 保存モーダル
let modalContent   = '';
let modalFilename  = '';

// ── 定数（翻訳速度チューニング — 超高速設定）──
const MIN_WORDS           = 3;     // 翻訳開始語数（3語で即開始）
const MIN_WORDS_COLDSTART = 4;     // 初回翻訳語数
const MIN_WAIT            = 200;   // 翻訳間の最短間隔 ms（極限まで短縮）
const FORCE_TRANSLATE_MS  = 2000;  // 語数未満でも強制翻訳する待機時間 ms
const CONTEXT_WORDS       = 150;   // Claude に渡す英語コンテキスト語数（文脈理解のため150語維持）
const SUMMARY_INTERVAL    = 90000; // 要約間隔 ms
const SUMMARY_MIN_WORDS   = 30;

// ============================================================
// 初期化
// ============================================================
(function init() {
  const ck  = localStorage.getItem('claude_key')      || '';
  const ctx = localStorage.getItem('session_context') || '';
  if (ck)  document.getElementById('claude-key').value      = ck;
  if (ctx) document.getElementById('session-context').value = ctx;
  if (ck)  document.getElementById('setup-panel').style.display = 'none';
})();

// ============================================================
// UI ユーティリティ
// ============================================================
function toggleSetup() {
  const p = document.getElementById('setup-panel');
  p.style.display = (p.style.display === 'none') ? 'block' : 'none';
}
function saveKeys() {
  const ck = document.getElementById('claude-key').value.trim();
  if (ck) localStorage.setItem('claude_key', ck);
}
function saveContext() {
  localStorage.setItem('session_context', document.getElementById('session-context').value);
}
function getKey()  { return document.getElementById('claude-key').value.trim() || localStorage.getItem('claude_key') || ''; }
function getCtx()  { return document.getElementById('session-context').value.trim() || ''; }

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['main','summary'][i] === name));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('active', p.id === 'tab-' + name));
}

function setBadge(id, text, cls) {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = 'badge ' + cls; }
}
function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 9000);
}
function showSaveStatus(msg, autoHide = false, ms = 0) {
  const el = document.getElementById('save-status');
  el.textContent = msg; el.style.display = 'block';
  if (autoHide) setTimeout(() => { el.style.display = 'none'; }, ms || 5000);
}
function updateElapsed() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('s-el').textContent =
    String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}
function _updateBtns(rec) {
  document.getElementById('start-btn').disabled = rec;
  document.getElementById('stop-btn').disabled  = !rec;
  document.getElementById('start-btn').textContent = rec ? '🔴 録音中' : '▶ 開始';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 平均タイムラグ更新
function recordLag(sec) {
  lagHistory.push(sec);
  if (lagHistory.length > 10) lagHistory.shift();
  const avg = (lagHistory.reduce((a,b) => a+b, 0) / lagHistory.length).toFixed(1);
  document.getElementById('s-lag').textContent = avg;
}

// ============================================================
// 録音ステータス（仕切り行に表示）
// ============================================================
function startMeter() {
  meterAnim = setInterval(() => {
    const inline = document.getElementById('rec-inline');
    if (!inline) return;
    const dots = ['●○○','○●○','○○●'][Math.floor(Date.now()/400)%3];
    inline.textContent = isOn ? `🔴 ${dots}` : '';
  }, 400);
}
function stopMeter() {
  clearInterval(meterAnim);
  const inline = document.getElementById('rec-inline');
  if (inline) inline.textContent = '';
}

// ============================================================
// Web Speech API 音声認識
// ============================================================
function startListening() {
  if (isOn) return;
  if (!getKey()) { showErr('⚠️ Claude API Keyを設定してください'); toggleSetup(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('⚠️ このブラウザは音声認識に対応していません（Safari / Chrome を使用）'); return; }

  recognition               = new SR();
  recognition.lang          = 'en-US';
  recognition.continuous    = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  // ── 認識結果 ──
  recognition.onresult = (event) => {
    let interim = '';
    let final_  = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final_ += t;
      else interim += t;
    }

    if (final_.trim()) {
      // バッチ開始時刻: 0のときだけ記録（=新バッチの最初の語が届いた瞬間）
      if (batchArrivalTime === 0) batchArrivalTime = Date.now();
      lastFinalArrival = Date.now();

      fullText += final_.trim() + ' ';
      document.getElementById('s-words').textContent =
        fullText.trim().split(/\s+/).filter(Boolean).length;
      // 確定テキスト → 即座に翻訳チェック
      maybeTranslate(true);
    }

    // interim を保持して原文エリアを更新
    currentInterim = interim;
    updateTranscriptView(interim);
  };

  // ── 終了 → iOS 対策で自動再起動 ──
  recognition.onend = () => {
    if (isOn) setTimeout(() => {
      if (isOn && recognition) try { recognition.start(); } catch(e) {}
    }, 250);
  };

  recognition.onerror = (ev) => {
    if (['no-speech','aborted'].includes(ev.error)) return;
    if (ev.error === 'network') { showErr('⚠️ ネットワークエラー（インターネット接続が必要です）'); return; }
    console.warn('[STT]', ev.error);
  };

  isOn = true;
  lastTranslated = Date.now();
  batchArrivalTime = 0;  // 発話が来た瞬間にセットする（録音開始時刻は含めない）

  try { recognition.start(); }
  catch(e) { isOn = false; showErr('⚠️ 音声認識開始失敗: ' + e.message); return; }

  if (!startTime) { startTime = Date.now(); elapsedLoop = setInterval(updateElapsed, 1000); }

  setBadge('b-mic', '🔴 認識中', 'bon');
  _updateBtns(true);
  document.getElementById('setup-panel').style.display = 'none';

  startMeter();
  startSummaryTimer();
}

function stopListening() {
  isOn = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  clearInterval(elapsedLoop);
  stopMeter();
  setBadge('b-mic', '⏹ 停止', 'boff');
  currentInterim = '';
  document.getElementById('transcript-interim').textContent = '';
  _updateBtns(false);
  stopSummaryTimer();
}

// ── 英語ハイライト付き原文ビルド ──
// 最新セグメント=紫、過去セグメント=薄青、未翻訳=通常色
function buildHighlightedTranscript() {
  if (!fullText) return '';
  let html = '';
  let pos = 0;
  const lastIdx = translatedSegments.length - 1;

  for (let i = 0; i < translatedSegments.length; i++) {
    const seg = translatedSegments[i];
    const isLatest = (i === lastIdx);
    const bg  = isLatest ? HL_LATEST_BG     : HL_PREV_BG;
    const bdr = isLatest ? HL_LATEST_BORDER  : HL_PREV_BORDER;

    // セグメント前のギャップ
    if (pos < seg.start) {
      html += esc(fullText.slice(pos, seg.start));
    }
    html += `<span style="background:${bg};border-radius:3px;padding:1px 2px;`
          + `border-bottom:2px solid ${bdr}">`
          + esc(fullText.slice(seg.start, seg.end))
          + `</span>`;
    pos = seg.end;
  }

  // 未翻訳テキスト
  if (pos < fullText.length) {
    html += esc(fullText.slice(pos));
  }

  return html;
}

    committed.style.color = '#bbb';

  // 常に最下部にスクロール

}

// ============================================================
// 翻訳タイミング制御（高速化）
// ============================================================
function hasCompleteSentence(text) {
  return /[.!?](\s|$)/.test(text.trim());
}
function ensureJpComplete(text) {
  if (!text) return text;
  const t = text.trim();
  if (/[。！？]$/.test(t)) return t;
  const last = Math.max(t.lastIndexOf('。'), t.lastIndexOf('！'), t.lastIndexOf('？'));
  if (last > 0 && last >= t.length * 0.3) return t.slice(0, last + 1);
  return t + '。';
}

// immediate=true のとき語数チェックをやや緩める
function maybeTranslate(immediate = false) {
  if (translating) return;
  const chunk = fullText.slice(readPos).trim();
  const words = chunk.split(/\s+/).filter(Boolean).length;
  const wait  = Date.now() - lastTranslated;

  if (wait < MIN_WAIT) return;

  const isColdStart = (recentJpTrans.length === 0);
  const threshold   = isColdStart ? MIN_WORDS_COLDSTART : MIN_WORDS;

  if (words < threshold) {
    // 強制翻訳タイムアウト（2秒待てば2語でも翻訳）
    if (words >= 2 && wait >= FORCE_TRANSLATE_MS) { doTranslate(); return; }
    return;
  }

  // 文末があればすぐ翻訳、なければ immediate か強制タイムアウト
  if (hasCompleteSentence(chunk) || immediate || wait >= FORCE_TRANSLATE_MS) {
    doTranslate();
  }
}

// 定期チェック（500ms間隔 — 超高速）
setInterval(() => { if (isOn && !translating) maybeTranslate(); }, 500);

// ============================================================
// Claude API 翻訳（超短プロンプトで低遅延化）
// ============================================================
async function doTranslate() {
  if (translating) return;
  const chunk = fullText.slice(readPos).trim();
  if (!chunk || chunk.split(/\s+/).filter(Boolean).length < 2) return;

  const key = getKey();
  if (!key) return;

  translating = true;
  const prevReadPos         = readPos;              // ハイライト用に保存
  const snapshot            = fullText.length;
  const capturedBatchStart  = batchArrivalTime > 0 ? batchArrivalTime : Date.now();
  lastTranslated            = Date.now();
  setBadge('b-ai', '🤖 翻訳中…', 'bwait');

  // ── コンテキスト構築 ──
  // 日本語コンテキストは直近2件・各80字まで（速度優先）
  const jpCtx  = recentJpTrans.slice(-2).map(t => t.slice(0,80)).join(' ');
  const prevEn = fullText.slice(0, readPos).trim()
                  .split(/\s+/).filter(Boolean).slice(-CONTEXT_WORDS).join(' ');
  const ctx    = getCtx();

  // ── 超短プロンプト（トークン削減 → 速度向上）──
  const prompt = [
    '同時通訳: 英語を自然な日本語に意訳。訳文のみ・1〜3文・「。」で終わること。',
    ctx    ? `[背景] ${ctx}`           : '',
    jpCtx  ? `[直近訳] ${jpCtx}`      : '',
    prevEn ? `[直前文脈] ${prevEn}` : '',
    `[訳して] ${chunk}`,
  ].filter(Boolean).join('\n');

  try {
    const res = await claudeRequest({
      model:      'claude-haiku-4-5-20251001',
      max_tokens: 280,     // さらに削減して応答を速く
      messages:   [{ role:'user', content: prompt }],
    }, 18000);

    const rawJp = res?.content?.[0]?.text?.trim() || '';
    if (!rawJp) throw new Error('翻訳結果が空です');

    const jpText = ensureJpComplete(rawJp);

    // ── タイムラグ計測（音声入力開始 → 翻訳表示）──
    const lagSec = ((Date.now() - capturedBatchStart) / 1000).toFixed(1);
    recordLag(parseFloat(lagSec));

    // ── セグメント登録（英語ハイライト用）──
    // 先頭の空白を除いた実際の開始位置を求める
    const leadingSpaces = fullText.slice(prevReadPos).length
                        - fullText.slice(prevReadPos).trimStart().length;
    translatedSegments.push({ start: prevReadPos + leadingSpaces, end: snapshot });

    readPos = snapshot;

    // バッチ到着時刻リセット（次の発話で 0 から再計測）
    batchArrivalTime = 0;

    setBadge('b-ai', '🤖 完了', 'bon');
    recentJpTrans.push(jpText);
    if (recentJpTrans.length > 8) recentJpTrans.shift();

    jpCount++;
    document.getElementById('s-trans').textContent = jpCount;
    addJpCard(jpText, chunk, lagSec);

    // ハイライト更新（currentInterim を保持して interim を消さない）
    updateTranscriptView(currentInterim);

  } catch(e) {
    if (e.name !== 'AbortError') {
      showErr('⚠️ 翻訳エラー: ' + e.message);
      setBadge('b-ai', '⚠️ エラー', 'boff');
    }
  } finally {
    translating = false;
    // 翻訳完了直後に次のテキストをすぐチェック（パイプライン化）
    setTimeout(() => maybeTranslate(false), 80);
  }
}

// ============================================================
// 共通 Claude API リクエスト（iOS fetch 対策）
// ============================================================
async function claudeRequest(body, timeoutMs = 30000) {
  // AbortSignal.timeout が使えない古い Safari 向けに手動タイムアウト
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'x-api-key':     getKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body:   JSON.stringify(body),
      signal: controller.signal,
    });
    clearTimeout(tid);
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(`Claude API ${res.status}: ${txt.slice(0,120)}`);
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data;
  } catch(e) {
    clearTimeout(tid);
    // iOS Safari の "Load failed" を人間が読めるエラーに変換
    if (e.message === 'Load failed' || e.message === 'Failed to fetch') {
      throw new Error('通信エラー（APIキーまたはネットワークを確認してください）');
    }
    throw e;
  }
}

function parseSummary(text) {
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
  let html='', bullets=[], sec='', inOv=false;
  function flush() {
    if (!bullets.length) return;
    if (sec) html += `<div class="smr-section-title">${esc(sec)}</div>`;
    html += `<ul class="smr-points">${bullets.map(b=>`<li class="smr-point">${esc(b)}</li>`).join('')}</ul>`;
    bullets=[]; sec='';
  }
  for (const l of lines) {
    if (/^▌/.test(l)) { inOv=true; const r=l.replace(/^▌\s*(概要)?\s*/i,'').trim(); if(r) html+=`<div class="smr-overview">${esc(r)}`; continue; }
    if (/^##/.test(l)) { if(inOv){html+='</div>';inOv=false;} flush(); sec=l.replace(/^#+\s*/,'').trim(); continue; }
    if (/^[•・\-]/.test(l)||/^\d+[\.\)]/.test(l)) { if(inOv){html+='</div>';inOv=false;} bullets.push(l.replace(/^[\s•・\-\d\.\)]+/,'').trim()); continue; }
    if (/^(キーワード|Keywords)/i.test(l)) { if(inOv){html+='</div>';inOv=false;} flush(); html+=`<div class="smr-section-title">キーワード</div><div class="smr-keywords">${esc(l.replace(/^[^:：]*[：:]\s*/,'').trim())}</div>`; continue; }
    if (inOv) { html+='<br>'+esc(l); continue; }
    html+=`<p style="font-size:12px;color:var(--muted);margin:3px 0;line-height:1.6">${esc(l)}</p>`;
  }
  if (inOv) html+='</div>'; flush();
  return html;
}

// ファイル保存（iOS対応: Web Share API → blob download の順で試行）
async function saveFile(content, filename) {
  const blob = new Blob([content], { type:'text/plain;charset=utf-8' });

  // ① Web Share API（iOS ネイティブ共有シートが開く）
  if (navigator.share && navigator.canShare &&
      navigator.canShare({ files:[new File([blob], filename, {type:'text/plain'})] })) {
    try {
      await navigator.share({
        files: [new File([blob], filename, { type:'text/plain' })],
        title: filename,
      });
      return;
    } catch(e) {
      if (e.name === 'AbortError') return; // ユーザーがキャンセル
    }
  }

  // ② 通常の <a download>（desktop Chrome 等）
  try {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    return;
  } catch(e) { /* フォールバックへ */ }

  // ③ モーダル表示（上記が両方失敗した場合）
  showSaveModal(content, filename);
}
